<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Command Center</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="lobby-view" class="view">
        <div class="lobby-content">
            <h1 class="gold-text pulse">VANGUARD CITIZEN KNIGHTS</h1>
            <p>Hardin County Local Sovereignty Hub</p>
            <div class="lobby-nav">
                <button class="btn-outline">PROJECTS</button>
                <button class="btn-gold" onclick="showAuth()">ENTER COMMAND CENTER</button>
            </div>
        </div>
    </div>

    <div id="hud-view" class="view hidden">
        <header class="hud-header">
            <div class="logo">VCS COMMAND</div>
            <div id="user-display" class="gold-text"></div>
        </header>

        <div class="category-tuner" id="cat-bar"></div>

        <div class="dual-pane">
            <section class="pane" id="resources-pane">
                <h2 class="pane-title">INTERNAL RESOURCES</h2>
                <div class="list" id="res-list"></div>
            </section>
            <section class="pane" id="alliances-pane">
                <h2 class="pane-title">AUTHORIZED ALLIANCES</h2>
                <div class="list" id="all-list"></div>
            </section>
        </div>

        <div class="footer-action">
            <button class="btn-gold large" onclick="showRequestModal()">INITIATE MISSION REQUEST</button>
        </div>
    </div>

    <div id="auth-modal" class="modal hidden">
        <div class="modal-box">
            <h3 class="gold-text">IDENTITY CLEARANCE</h3>
            <input type="text" id="fname" placeholder="FIRST NAME">
            <input type="email" id="uemail" placeholder="SECURE EMAIL">
            <button class="btn-gold" onclick="handleAuth()">SEND MAGIC LINK</button>
            <button class="btn-link" onclick="closeModals()">CANCEL</button>
        </div>
    </div>

    <div id="request-modal" class="modal hidden">
        <div class="modal-box">
            <h3 class="gold-text">SIGNAL DETAILS</h3>
            <textarea id="mission-details" placeholder="Describe the service or problem..."></textarea>
            <button class="btn-gold" onclick="submitMission()">SUBMIT SIGNAL</button>
            <button class="btn-link" onclick="closeModals()">CANCEL</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
