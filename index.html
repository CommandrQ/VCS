<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Citizen Entry</title>
    
    <style>
        /* --- CORE SYSTEM VARIABLES --- */
        :root {
            --gold: #D4AF37;
            --glass-bg: rgba(10, 10, 10, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --v-curve: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- FOUNDATION --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- THE VANGUARD UNIVERSE --- */
        #vanguard-universe {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .gold-star-layer {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, rgba(212, 175, 55, 0.8), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 100px 150px, rgba(255, 255, 255, 0.5), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 250px 50px, rgba(212, 175, 55, 0.4), rgba(0,0,0,0));
            background-size: 300px 300px;
            animation: drift 120s linear infinite;
        }

        @keyframes drift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- CENTERED MODULE --- */
        .entry-module {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s var(--v-curve);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-mark {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
            color: #fff;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* --- ACTION CONTROLS --- */
        .action-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s var(--v-curve);
            text-decoration: none;
            display: block;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: #fff;
            color: #000;
        }

        .btn-primary:active {
            transform: scale(0.97);
            background: var(--gold);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-color: var(--glass-border);
        }

        .btn-secondary:active {
            background: rgba(255,255,255,0.1);
            border-color: var(--gold);
        }

        /* --- FOOTER --- */
        .footer-tag {
            margin-top: 35px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- MOBILE OPTIMIZATIONS --- */
        @media (max-height: 600px) {
            .entry-module { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
            p.subtitle { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <!-- Star Background -->
    <div id="vanguard-universe">
        <div class="gold-star-layer"></div>
    </div>

    <!-- Centered Card -->
    <div class="entry-module">
        <span class="logo-mark">Vanguard</span>
        <h1>Citizen Entry</h1>
        <p class="subtitle">Hardin County Digital Services Portal</p>
        
        <div class="action-stack">
            <a href="settings.html" class="btn btn-primary">Access Terminal</a>
            <a href="hub.html" class="btn btn-secondary">Enter as Guest</a>
        </div>

        <div class="footer-tag">
            Vanguard Citizen Services &copy; <span id="year"></span>
        </div>
    </div>

    <script>
        // Automatic Year Sync
        document.getElementById('year').innerText = new Date().getFullYear();

        // Prevent zooming on mobile inputs if ever added
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
