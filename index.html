<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Citizen Services</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- CORE OS ARCHITECTURE --- */
        :root {
            --v-gold: #d4af37;
            --v-curve: cubic-bezier(0.4, 0, 0.2, 1);
            --v-error: #f87171;
        }
        
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* --- THE BACKGROUND ENGINE --- */
        .starfield {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .s1 {
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, var(--v-gold), rgba(0,0,0,0));
            background-size: 250px 250px; opacity: 0.3;
        }

        .scanlines {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: linear-gradient(to bottom, rgba(18,16,16,0) 50%, rgba(255,255,255,0.02) 50%);
            background-size: 100% 4px;
        }

        /* --- CENTERED LOBBY CONTENT --- */
        .lobby-container {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 5; text-align: center; padding: 20px;
            animation: systemWake 1s var(--v-curve) forwards;
        }

        @keyframes systemWake {
            from { opacity: 0; transform: scale(0.95); filter: blur(5px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .vcs-logo { width: 140px; margin-bottom: 25px; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.2)); }

        .main-title {
            font-size: 2.5rem; font-weight: 900; color: var(--v-gold);
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .motto {
            font-size: 1.2rem; font-weight: 700; letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 50px;
            animation: pulseGold 3s infinite;
        }

        @keyframes pulseGold {
            0%, 100% { color: #fff; }
            50% { color: var(--v-gold); text-shadow: 0 0 15px var(--v-gold); }
        }

        /* --- THE BUTTON --- */
        .btn-pill {
            font-family: inherit; font-weight: 900; padding: 18px 45px;
            font-size: 1rem; border-radius: 50px; cursor: pointer;
            transition: 0.3s var(--v-curve); border: none; text-transform: uppercase;
            letter-spacing: 2px; background: var(--v-gold); color: #000;
            box-shadow: 0 5px 0 #8a6d0d;
        }
        
        .btn-pill:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #8a6d0d, 0 15px 25px rgba(212, 175, 55, 0.3); }
        .btn-pill:active { transform: translateY(3px); box-shadow: 0 2px 0 #8a6d0d; }

        .sys-status { margin-top: 30px; font-size: 0.85rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .status-online { color: #4ade80; }
        .status-offline { color: var(--v-error); }

        /* --- RESTRICTED MODAL --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-box {
            background: #050505; border: 2px solid var(--v-error); padding: 40px;
            border-radius: 30px; text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 0 40px rgba(248, 113, 113, 0.15);
        }
        input {
            width: 100%; background: #111; border: 1px solid #333; padding: 15px;
            color: #fff; border-radius: 12px; margin-bottom: 20px; font-size: 1rem;
        }

        /* --- FOOTER --- */
        .vanguard-footer { border-top: 2px solid #222; padding: 25px 20px; background: #000; z-index: 10; text-align: center; }
        .vanguard-footer p { color: #FFF; font-size: 0.95rem; font-weight: bold; margin: 0; letter-spacing: 1.5px; }

        @media (max-width: 768px) {
            .vcs-logo { width: 110px; }
            .main-title { font-size: 1.6rem; }
            .motto { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <main class="lobby-container">
        <img src="images/vanguardorglogo.png" alt="VCS Logo" class="vcs-logo">
        <h1 class="main-title">Vanguard Citizen Services</h1>
        <p class="motto">Empower. Elevate. Educate.</p>

        <button class="btn-pill" onclick="handleEntryRequest()">ENTER COMMAND CENTER</button>
        <div id="sys-status-text" class="sys-status">SYSTEM INITIALIZING...</div>
    </main>

    <div class="modal-overlay" id="lockdown-modal">
        <div class="modal-box">
            <h2 style="color: var(--v-error); text-transform: uppercase; margin-bottom: 10px;">Maintenance Mode</h2>
            <p style="color: #888; font-size: 0.85rem; margin-bottom: 25px;">The Fort is currently restricted. Authorized Command personnel only.</p>
            
            <input type="email" id="admin-email" placeholder="Command Email Address">
            <button class="btn-pill" onclick="requestAdminAccess()" style="width: 100%; background: transparent; border: 1px solid var(--v-error); color: var(--v-error); box-shadow: none;">Verify Clearance</button>
            
            <p id="modal-msg" style="margin-top: 15px; font-size: 0.75rem; color: var(--v-gold);"></p>
            <button onclick="closeModal()" style="background:none; border:none; color:#444; cursor:pointer; margin-top:20px; font-size:0.7rem; text-transform:uppercase;">Return to Lobby</button>
        </div>
    </div>

    <footer class="vanguard-footer">
        <p>&copy; 2026 VANGUARD CITIZEN SERVICES</p>
    </footer>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let IS_ONLINE = true;

        // 1. Initial System Check
        async function checkSystem() {
            const { data } = await supabaseClient.from('system_config').select('value_bool').eq('key', 'site_online').single();
            IS_ONLINE = data ? data.value_bool : true;

            const statusIndicator = document.getElementById('sys-status-text');
            if (!IS_ONLINE) {
                statusIndicator.innerText = "SYSTEM OFFLINE : MAINTENANCE PROTOCOL";
                statusIndicator.className = "sys-status status-offline";
            } else {
                statusIndicator.innerText = "SYSTEM ACTIVE : SECURE CONNECTION";
                statusIndicator.className = "sys-status status-online";
            }
        }

        // 2. Handle Main Button Click
        async function handleEntryRequest() {
            if (IS_ONLINE) {
                // If online, send to Directory (Directory will check if they are logged in)
                window.location.href = "directory.html";
            } else {
                // If offline, check if they are ALREADY a logged-in Command user
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    const { data: user } = await supabaseClient.from('citizens').select('role').eq('auth_id', session.user.id).single();
                    if (user && user.role === 'Command') {
                        window.location.href = "directory.html";
                        return;
                    }
                }
                // Otherwise, show the lockdown modal
                document.getElementById('lockdown-modal').style.display = 'flex';
            }
        }

        // 3. Request Access Link for Admin
        async function requestAdminAccess() {
            const email = document.getElementById('admin-email').value;
            const msg = document.getElementById('modal-msg');
            if (!email) { msg.innerText = "Email required."; return; }

            msg.innerText = "Validating...";
            const { error } = await supabaseClient.auth.signInWithOtp({ email });
            
            if (error) {
                msg.innerText = "Error: Access Denied.";
            } else {
                msg.innerText = "Clearance Link Sent. Check your email.";
            }
        }

        function closeModal() { document.getElementById('lockdown-modal').style.display = 'none'; }

        window.onload = checkSystem;
    </script>
</body>
</html>
