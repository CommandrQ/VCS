<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Citadel | Digital Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --void-obsidian: #0D0D0D;
            --deep-shadow: #050505;
            --relic-gold: #D4AF37;
            --aura-purple: #BF94FF;
            --success-green: #00FF41;
            --starlight-white: #F5F5F7;
            --iron-mist: #86868B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--deep-shadow);
            font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--starlight-white);
        }

        /* User Background Image with a dark overlay */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/introbkgd.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
            filter: brightness(0.4) contrast(1.2);
            transition: transform 1.5s cubic-bezier(0.8, 0, 0.2, 1);
        }

        /* Tron-style Digital Scanlines & Grid */
        .digital-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(191, 148, 255, 0.03), rgba(191, 148, 255, 0) 1px),
                linear-gradient(rgba(191, 148, 255, 0.03), rgba(191, 148, 255, 0) 1px);
            background-size: 100% 4px, 40px 40px, 40px 40px;
            z-index: 1;
            pointer-events: none;
        }

        /* Terminal Boot Sequence */
        #boot-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            z-index: 10;
            font-family: monospace;
            color: var(--success-green);
            text-shadow: 0 0 5px var(--success-green);
            font-size: 1.1rem;
            line-height: 1.8;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .log-line {
            display: none;
        }

        /* Main Welcome UI (Hidden initially) */
        #main-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.95);
            transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none; /* Ignored until active */
        }

        #main-ui.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .citadel-title {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            color: var(--relic-gold);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5), 0 0 40px rgba(212, 175, 55, 0.2);
            letter-spacing: 5px;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .citadel-subtitle {
            font-size: 1.2rem;
            color: var(--aura-purple);
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 50px;
            text-shadow: 0 0 10px var(--aura-purple);
        }

        /* Digital Button */
        .cyber-btn {
            background: transparent;
            border: 2px solid var(--aura-purple);
            color: var(--starlight-white);
            padding: 15px 50px;
            font-family: 'SF Pro', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(191, 148, 255, 0.2) inset, 0 0 15px rgba(191, 148, 255, 0.2);
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(191, 148, 255, 0.4), transparent);
            transition: all 0.5s ease;
        }

        .cyber-btn:hover {
            background: rgba(191, 148, 255, 0.1);
            border-color: var(--success-green);
            color: var(--success-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4) inset, 0 0 20px rgba(0, 255, 65, 0.4);
        }

        .cyber-btn:hover::before {
            left: 100%;
        }

        /* Transition Effect */
        #warp-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--starlight-white);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in;
            mix-blend-mode: overlay;
        }

        .warp-active .bg-layer {
            transform: scale(3); /* Zooms into the background */
            filter: brightness(2) blur(10px);
        }
    </style>
</head>
<body>

    <div class="bg-layer" id="bg"></div>
    <div class="digital-overlay"></div>
    <div id="warp-overlay"></div>

    <div id="boot-screen">
        <div class="log-line">INITIALIZING VANGUARD_OS v3.1... [ <span style="color:var(--relic-gold)">WAIT</span> ]</div>
        <div class="log-line">ESTABLISHING SECURE CONNECTION... [ <span style="color:var(--success-green)">OK</span> ]</div>
        <div class="log-line">BYPASSING EXTERNAL FIREWALLS... [ <span style="color:var(--success-green)">OK</span> ]</div>
        <div class="log-line">DECRYPTING CITADEL PROTOCOLS... [ <span style="color:var(--success-green)">OK</span> ]</div>
        <div class="log-line" style="color:var(--starlight-white); margin-top: 20px;">WELCOME, CITIZEN KNIGHT.</div>
    </div>

    <div id="main-ui">
        <h1 class="citadel-title">The Grand Citadel</h1>
        <h2 class="citadel-subtitle">Headquarters Online</h2>
        <button class="cyber-btn" id="enter-btn">Initialize Link</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const logs = document.querySelectorAll('.log-line');
            const bootScreen = document.getElementById('boot-screen');
            const mainUI = document.getElementById('main-ui');
            const enterBtn = document.getElementById('enter-btn');
            const body = document.body;
            const warpOverlay = document.getElementById('warp-overlay');

            // Boot Sequence Animation Logic
            let delay = 500;
            
            logs.forEach((log, index) => {
                setTimeout(() => {
                    log.style.display = 'block';
                }, delay);
                // Increase delay to simulate loading times
                delay += (Math.random() * 600) + 400; 
            });

            // Transition from Boot to Main UI
            setTimeout(() => {
                bootScreen.style.opacity = '0';
                
                setTimeout(() => {
                    bootScreen.style.display = 'none';
                    mainUI.classList.add('active');
                }, 500); // Wait for fade out
                
            }, delay + 800); // Trigger after last log line

            // Enter Button Transition Logic
            enterBtn.addEventListener('click', () => {
                // Trigger digital warp zoom
                body.classList.add('warp-active');
                warpOverlay.style.opacity = '1';

                // Redirect to home.html after transition finishes
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1200);
            });
        });
    </script>
</body>
</html>
