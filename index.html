<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fort Toward | Vanguard Prime</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS for the Restricted Login Box */
        .lockdown-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center;
        }
        .lockdown-box {
            background: #050505; border: 2px solid var(--error-red); padding: 40px;
            border-radius: 24px; text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 0 30px rgba(248, 113, 113, 0.2);
        }
    </style>
</head>
<body>

    <div class="universe"><div class="star-layer"></div></div>

    <header class="vanguard-header">
        <h1 class="gold-text-outline" style="text-transform: uppercase; font-size: 1.5rem; letter-spacing: 2px;">Fort Toward</h1>
    </header>

    <main>
        <div class="glass-card animate-wake" id="standard-ui">
            <div style="text-align: center; width: 100%;">
                <h3 id="status-label" style="color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px;">Network Status: Online</h3>
                <h1 style="font-size: 2rem; font-weight: 900; line-height: 1.1; text-transform: uppercase;">Citizen Portal</h1>
            </div>

            <hr class="white-divider">

            <p id="auth-msg" style="font-size: 0.85rem; color: var(--text-dim); min-height: 3.5em; padding: 0 10px;">
                Synchronize credentials to establish a secure link.
            </p>

            <div class="settings-form" style="width: 100%; display: flex; flex-direction: column; gap: 15px;">
                <div id="login-fields">
                    <input type="email" id="login-email" placeholder="Citizen Email">
                    <button class="gold-pill" onclick="handleAuth()" style="width: 100%;">Request Link</button>
                </div>
                
                <div id="entry-zone" style="display: none;">
                    <button class="gold-pill" id="hub-btn" onclick="handleEntry()" style="width: 100%; background: var(--gold); color: #000;">Enter Command Hub</button>
                    <button class="legal-link" onclick="handleLogout()" style="margin-top: 10px; width: 100%; text-align: center; background: none; border: none; color: #444; cursor: pointer;">Disconnect Session</button>
                </div>
            </div>
        </div>
    </main>

    <div class="lockdown-overlay" id="lockdown-overlay">
        <div class="lockdown-box">
            <h2 style="color: var(--error-red); text-transform: uppercase; margin-bottom: 10px;">Fort Offline</h2>
            <p style="color: #888; font-size: 0.8rem; margin-bottom: 20px;">The network is currently under maintenance. Authorized Command personnel only.</p>
            
            <input type="email" id="admin-email" placeholder="Command Email" style="margin-bottom: 15px; width: 100%; background: #111; border: 1px solid #333; padding: 12px; color: white; border-radius: 8px;">
            <button class="gold-pill" onclick="handleAdminAuth()" style="width: 100%; border-color: var(--error-red); color: var(--error-red);">Authorize Command</button>
            <p id="admin-msg" style="font-size: 0.7rem; margin-top: 10px; color: var(--gold);"></p>
        </div>
    </div>

    <footer class="vanguard-footer">
        <p id="footer-text">Powered Vanguard Citizen Services © 2026</p>
    </footer>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let SITE_ONLINE = true;

        // 1. Initial Status Check
        async function checkSiteStatus() {
            const { data } = await supabaseClient.from('system_config').select('value_bool').eq('key', 'site_online').single();
            SITE_ONLINE = data ? data.value_bool : true;

            if (!SITE_ONLINE) {
                document.getElementById('status-label').innerText = "Network Status: Restricted";
                document.getElementById('status-label').style.color = "var(--error-red)";
                
                // If user is already logged in, check if they are Command
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    const { data: citizen } = await supabaseClient.from('citizens').select('role').eq('auth_id', session.user.id).single();
                    if (!citizen || citizen.role !== 'Command') {
                        // User is logged in but NOT command. Show lockdown box.
                        document.getElementById('lockdown-overlay').style.display = 'flex';
                    } else {
                        // User is Command. Show hub button.
                        showEntryZone();
                    }
                } else {
                    // Not logged in and site is offline. Show lockdown box.
                    document.getElementById('lockdown-overlay').style.display = 'flex';
                }
            } else {
                // Site is online. Check session normally.
                syncSession();
            }
        }

        async function syncSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) showEntryZone();
        }

        function showEntryZone() {
            document.getElementById('login-fields').style.display = 'none';
            document.getElementById('entry-zone').style.display = 'block';
            document.getElementById('auth-msg').innerText = "Terminal Synchronized. Clearance active.";
        }

        // Auth Logic
        async function handleAuth() {
            const email = document.getElementById('login-email').value;
            if (!email) return;
            const { error } = await supabaseClient.auth.signInWithOtp({ email });
            document.getElementById('auth-msg').innerText = error ? "Error: " + error.message : "Access Link Transmitted.";
        }

        async function handleAdminAuth() {
            const email = document.getElementById('admin-email').value;
            if (!email) return;
            const { error } = await supabaseClient.auth.signInWithOtp({ email });
            document.getElementById('admin-msg').innerText = error ? "Error" : "Link Sent. Check Transmission.";
        }

        // THE ENTRY COMMAND
        async function handleEntry() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.reload(); return; }

            const { data: citizen } = await supabaseClient.from('citizens').select('role').eq('auth_id', session.user.id).single();
            const userRole = citizen ? citizen.role : 'Citizen';

            if (!SITE_ONLINE && userRole !== 'Command') {
                // Security Kick if they somehow reached the button but aren't Command
                window.location.href = 'https://vcscitizen.org/uc.html';
            } else {
                window.location.href = 'directory.html';
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        // Run on Load
        window.onload = () => { checkSiteStatus(); runFooter(); };

        function runFooter() {
            const el = document.getElementById('footer-text');
            const original = "Powered Vanguard Citizen Services © 2026";
            const motto = "Empower . Educate . Elevate";
            const cycle = () => {
                el.style.opacity = '0';
                setTimeout(() => {
                    el.innerText = (el.innerText === original) ? motto : original;
                    el.style.opacity = '1';
                }, 600);
            };
            setInterval(cycle, 6000);
        }
    </script>
</body>
</html>
