<script>
    // --- UPDATED UNLOCKED BOUNCER ---
    async function checkIdentityStatus() {
        // We still check the session to be helpful, but we don't redirect on failure.
        const { data: { session } } = await supabaseClient.auth.getSession();
        
        document.getElementById('security-overlay').style.display = 'none';
        document.getElementById('secure-form-area').style.display = 'block';

        if (session) {
            const { data } = await supabaseClient
                .from('citizens')
                .select('email, full_name, auth_id')
                .eq('auth_id', session.user.id)
                .single();

            if (data) {
                currentUser = data;
                // Auto-fill and lock if they are a known Citizen
                document.getElementById('m-name').value = data.full_name;
                document.getElementById('m-name').disabled = true;
                document.getElementById('m-email').value = data.email;
                document.getElementById('m-email').disabled = true;
                msg("Verified Citizen detected. Identity auto-filled.", "var(--v-gold)");
            }
        } else {
            // Unverified user: allow manual entry
            document.getElementById('m-name').disabled = false;
            document.getElementById('m-email').disabled = false;
            msg("Anonymous Signal. Please provide contact details.", "#888");
        }
    }

    async function transmitSignal() {
        const name = document.getElementById('m-name').value.trim();
        const email = document.getElementById('m-email').value.trim();
        const desc = document.getElementById('ticket-desc').value.trim();

        if (!name || !email || !desc) {
            return msg("All fields required to transmit signal.", "red");
        }

        msg("Transmitting...", "#888");

        const payload = {
            citizen_name: name,
            citizen_email: email,
            issue_description: desc,
            auth_id: currentUser ? currentUser.auth_id : null // Link to ID if they have one
        };

        const { error } = await supabaseClient.from('missions').insert([payload]);

        if (error) {
            msg("Transmission Failed: " + error.message, "red");
        } else {
            msg("SIGNAL RECEIVED. A Knight will contact you shortly.", "var(--v-gold)");
            playSuccessSound();
        }
    }
</script>
