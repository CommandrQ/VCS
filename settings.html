<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | My Settings</title>
    
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.85);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            background: #000;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #vanguard-universe { position: fixed; inset: 0; z-index: 0; background: #000; }
        .star-layer {
            position: absolute; inset: -50%; width: 200%; height: 200%;
            background-image: radial-gradient(2px 2px at 50px 80px, var(--gold), transparent), 
                              radial-gradient(1px 1px at 150px 250px, #fff, transparent);
            background-size: 500px 500px; animation: orbit 240s linear infinite;
        }
        @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #app-wrapper {
            position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center;
            height: 100vh; width: 100%; overflow-y: auto; text-align: center; scrollbar-width: none;
        }

        header {
            width: 90%; max-width: 500px; margin-top: 30px; padding: 30px;
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-bottom: 2px solid var(--gold);
        }

        .window {
            width: 90%; max-width: 500px; background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); padding: 40px 30px; margin: 20px 0;
        }

        .status-light { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.7; }
        .name-display { font-size: 1.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .id-display { color: var(--gold); font-weight: bold; margin-top: 5px; letter-spacing: 1px; }

        .box { width: 100%; background: rgba(0,0,0,0.7); border: 1px solid var(--glass-border); color: var(--white); padding: 16px; margin-bottom: 15px; text-align: center; border-radius: 4px; }
        .btn { width: 100%; padding: 16px; background: transparent; border: 1px solid var(--gold); color: var(--gold); text-transform: uppercase; font-weight: 900; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div id="vanguard-universe"><div class="star-layer"></div></div>

    <main id="app-wrapper">
        <header>
            <div id="check-status" class="status-light">System: Ready</div>
            <div class="name-display" id="top-name">GUEST</div>
            <div class="id-display" id="top-id">VCS-OFFLINE</div>
        </header>

        <div class="window">
            <div id="login-form">
                <h2>Sign In</h2>
                <input type="email" id="email-in" class="box" placeholder="EMAIL ADDRESS">
                <input type="password" id="pass-in" class="box" placeholder="PASSWORD">
                <button class="btn" onclick="handleSignIn()">Sign In</button>
            </div>

            <div id="profile-view" style="display: none;">
                <h2>Account Active</h2>
                <p id="user-email-label" style="margin-bottom: 20px; opacity: 0.8;"></p>
                <button class="btn" onclick="handleSignOut()">Sign Out</button>
            </div>
        </div>

        <a href="hub.html" class="btn" style="max-width: 500px; border-color: #fff; color: #fff; text-decoration: none; display: inline-block;">Back to Hub</a>
    </main>

    <script>
        // PROJECT CREDENTIALS
        const supabase = supabase.createClient(
            'https://dvyjupytbwbrcoyouxpf.supabase.co', 
            'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk'
        );

        // Helper to update the top status
        function updateUIStatus(msg, color = "#fff") {
            const el = document.getElementById('check-status');
            el.innerText = `System: ${msg}`;
            el.style.color = color;
        }

        async function handleSignIn() {
            const email = document.getElementById('email-in').value;
            const pass = document.getElementById('pass-in').value;
            updateUIStatus("Verifying...");
            
            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) {
                alert("Login failed: " + error.message);
                updateUIStatus("Login Failed", "#ff4d4d");
            } else {
                window.location.reload();
            }
        }

        async function handleSignOut() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        // THE CORE LOOKUP LOGIC
        async function loadCitizenProfile() {
            const { data: { user } } = await supabase.auth.getUser();

            if (user) {
                // Switch views
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('profile-view').style.display = 'block';
                document.getElementById('user-email-label').innerText = user.email;

                updateUIStatus("Searching Table...");

                // Look up by email (handling potential case sensitivity)
                const searchEmail = user.email.toLowerCase();

                const { data, error } = await supabase
                    .from('citizens')
                    .select('full_name, citizen_number')
                    .ilike('email', searchEmail) // 'ilike' ignores upper/lower case
                    .single();

                if (error) {
                    console.error("Database Error:", error);
                    updateUIStatus("No Match Found", "#ffaa00");
                    document.getElementById('top-name').innerText = "Not Found";
                    document.getElementById('top-id').innerText = "VCS-PENDING";
                } else if (data) {
                    updateUIStatus("Citizen Verified", "#D4AF37");
                    document.getElementById('top-name').innerText = data.full_name;
                    document.getElementById('top-id').innerText = data.citizen_number;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadCitizenProfile);
    </script>
</body>
</html>
