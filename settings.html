<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project V | Command Center</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase Core -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <main id="app-wrapper">

        <header id="top-glass-panel" class="glass-module">
            <div class="citizen-status">
                <h1 id="settings-title">Settings</h1>
                <a href="hub.html" class="back-btn">HUB →</a>
            </div>
        </header>

        <section id="directory-core">
            <div id="directory-list">
                
                <!-- REGISTRATION CARD -->
                <div id="auth-card" class="link-card">
                    <h3 class="card-title" id="auth-header">Join the Sanctuary</h3>
                    <p class="card-desc" id="auth-desc">Please identify yourself to establish your secure connection.</p>
                    
                    <div id="guest-view" style="width: 100%;">
                        <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                            <label style="font-size: 0.7rem; color: var(--gold); font-weight: 800; letter-spacing: 2px;">FULL NAME</label>
                            <input type="text" id="reg-fullname" class="settings-input" style="margin-top: 10px;" placeholder="First and Last Name">
                        </div>

                        <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                            <label style="font-size: 0.7rem; color: var(--gold); font-weight: 800; letter-spacing: 2px;">EMAIL ADDRESS</label>
                            <input type="email" id="auth-email" class="settings-input" style="margin-top: 10px;" placeholder="name@email.com">
                        </div>
                        
                        <button onclick="handleAuth()" class="gate-button">Send Access Link</button>
                    </div>

                    <div id="citizen-view" style="width: 100%; display: none;">
                        <button onclick="signOut()" class="gate-button" style="border-color: var(--danger); color: var(--danger);">Disconnect / Logout</button>
                    </div>
                    
                    <div id="auth-msg" style="margin-top: 20px; font-size: 0.9rem; font-weight: 700;"></div>
                </div>

                <!-- IDENTITY CARD -->
                <div id="identity-card" class="link-card" style="display: none;">
                    <h3 class="card-title">Who are you?</h3>
                    <p class="card-desc">Your Hero Name is how you appear to others in the Vanguard Network.</p>
                    
                    <div class="form-group" style="width: 100%; text-align: left; margin-bottom: 20px;">
                        <label style="font-size: 0.8rem; color: var(--gold); font-weight: 800; letter-spacing: 2px;">HERO NAME</label>
                        <input type="text" id="new-name" class="settings-input" style="margin-top: 10px;" placeholder="Update name...">
                    </div>

                    <div class="button-group">
                        <button onclick="updateName()" class="card-btn">Save Identity</button>
                        <button onclick="sendRestoreLink()" class="card-btn secondary">Email Restore Link</button>
                    </div>
                </div>

                <!-- MAINTENANCE -->
                <div class="link-card">
                    <h3 class="card-title">Is it broken?</h3>
                    <p class="card-desc">Refresh your connection if the interface feels unstable.</p>
                    
                    <div class="button-group">
                        <button onclick="clearCache()" class="card-btn">Fix My App</button>
                        <button onclick="fullReset()" class="card-btn danger">Clean Slate</button>
                    </div>
                </div>

            </div>
        </section>

        <footer id="bottom-glass-panel" class="glass-module">
            <div class="footer-container">
                <p class="footer-msg active">Vanguard Security Core Active</p>
            </div>
        </footer>

    </main>

    <script src="app.js"></script>
    <script>
        async function syncState() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const guestView = document.getElementById('guest-view');
            const citizenView = document.getElementById('citizen-view');
            const idCard = document.getElementById('identity-card');
            const header = document.getElementById('auth-header');
            const desc = document.getElementById('auth-desc');
            const title = document.getElementById('settings-title');

            if (user) {
                guestView.style.display = 'none';
                citizenView.style.display = 'block';
                idCard.style.display = 'flex';
                header.innerText = "Connected";
                desc.innerText = `Citizen Session: ${user.email}`;
                title.innerText = "Command Center";
                
                const cached = JSON.parse(localStorage.getItem('vanguard_profile')) || {};
                if(cached.name) document.getElementById('new-name').value = cached.name;
            } else {
                guestView.style.display = 'block';
                citizenView.style.display = 'none';
                idCard.style.display = 'none';
                header.innerText = "Join the Sanctuary";
                title.innerText = "Connect";
            }
        }

        document.addEventListener('DOMContentLoaded', syncState);

        async function handleAuth() {
            const fullname = document.getElementById('reg-fullname').value.trim();
            const email = document.getElementById('auth-email').value.trim();
            const msg = document.getElementById('auth-msg');

            if(!fullname || !email) {
                return alert("Identification is required.");
            }
            
            msg.innerText = "Initializing uplink...";
            msg.style.color = "var(--gold)";

            localStorage.setItem('vanguard_profile', JSON.stringify({ name: fullname }));

            const { error } = await supabaseClient.auth.signInWithOtp({
                email: email,
                options: { 
                    emailRedirectTo: window.location.origin + '/hub.html',
                    data: { full_name: fullname } 
                }
            });

            if(error) {
                msg.innerText = "Error: " + error.message;
                msg.style.color = "var(--danger)";
            } else {
                msg.innerText = "Check your email to complete registration!";
                msg.style.color = "#4ade80";
            }
        }

        async function updateName() {
            const name = document.getElementById('new-name').value.trim();
            if(!name) return alert("Provide a valid name.");
            const cached = JSON.parse(localStorage.getItem('vanguard_profile')) || {};
            cached.name = name;
            localStorage.setItem('vanguard_profile', JSON.stringify(cached));
            alert("Identity synchronized.");
            location.reload();
        }

        async function sendRestoreLink() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { error } = await supabaseClient.auth.resetPasswordForEmail(user.email);
            alert(error ? error.message : "Restore protocols sent to your email.");
        }

        function clearCache() {
            const prof = localStorage.getItem('vanguard_profile');
            localStorage.clear();
            if(prof) localStorage.setItem('vanguard_profile', prof);
            alert("Cache purged. Refreshing...");
            location.reload();
        }

        function fullReset() {
            if(confirm("DANGER: Wiping all local data and logging out. Proceed?")) {
                localStorage.clear();
                signOut();
            }
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            localStorage.removeItem('vanguard_profile');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
