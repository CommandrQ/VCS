<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Account Settings</title>
    
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold: #D4AF37;
            --white: #ffffff;
            --glass: rgba(0, 0, 0, 0.85);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        /* --- BASIC RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            height: 100%;
            background: #000;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- ANIMATED STARFIELD --- */
        #vanguard-universe {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #000;
        }

        .star-layer {
            position: absolute;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(2px 2px at 50px 80px, var(--gold), transparent),
                radial-gradient(1.5px 1.5px at 150px 250px, #fff, transparent);
            background-size: 500px 500px;
            animation: move-stars 240s linear infinite;
        }

        @keyframes move-stars { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        /* --- CENTERED LAYOUT --- */
        #app-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100%;
            overflow-y: auto;
            text-align: center;
            scrollbar-width: none;
        }

        #app-wrapper::-webkit-scrollbar { display: none; }

        /* --- HEADER PANEL --- */
        header {
            width: 90%;
            max-width: 500px;
            margin-top: 30px;
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-bottom: 2px solid var(--gold);
        }

        .status-text {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border: 1px solid var(--white);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .user-name {
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .citizen-id {
            color: var(--gold);
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* --- GLASS WINDOWS --- */
        .window {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 40px 30px;
            margin: 20px 0;
            border-radius: 4px;
        }

        h2 {
            color: var(--gold);
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        /* --- INPUTS & BUTTONS --- */
        .input-box {
            width: 100%;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--glass-border);
            color: var(--white);
            padding: 16px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1rem;
            border-radius: 2px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 1px;
        }

        .btn:hover { background: var(--gold); color: #000; }

        footer {
            width: 100%;
            padding: 30px;
            margin-top: auto;
            font-size: 0.7rem;
            letter-spacing: 3px;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <div id="vanguard-universe"><div class="star-layer"></div></div>

    <main id="app-wrapper">
        
        <!-- IDENTITY HEADER -->
        <header>
            <div id="system-status" class="status-text">System: Offline</div>
            <div class="user-name" id="display-name">GUEST</div>
            <div class="citizen-id" id="display-number">VCS-UNLINKED</div>
        </header>

        <!-- MAIN WINDOW -->
        <div class="window">
            
            <!-- FORM FOR SIGNING IN -->
            <div id="login-section">
                <h2>Sign In</h2>
                <input type="email" id="email-field" class="input-box" placeholder="EMAIL ADDRESS">
                <input type="password" id="pass-field" class="input-box" placeholder="PASSWORD">
                <button class="btn" onclick="signIn()">Sign In</button>
            </div>

            <!-- VIEW FOR SIGNED IN USERS -->
            <div id="profile-section" style="display: none;">
                <h2>Account Active</h2>
                <p style="margin-bottom: 20px;" id="current-email">...</p>
                <button class="btn" onclick="signOut()">Sign Out</button>
            </div>

        </div>

        <div style="margin-bottom: 60px; width: 90%; max-width: 500px;">
            <a href="hub.html" class="btn" style="border-color: #fff; color: #fff;">Back to Hub</a>
        </div>

        <footer>Vanguard &copy; <span id="year"></span></footer>
    </main>

    <script>
        // CRITICAL CONNECTION DETAILS
        const supabase = supabase.createClient(
            'https://dvyjupytbwbrcoyouxpf.supabase.co', 
            'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk'
        );

        // Visual Status Updater
        function updateStatus(text, color = "#fff") {
            const el = document.getElementById('system-status');
            el.innerText = `System: ${text}`;
            el.style.borderColor = color;
            el.style.color = color;
        }

        // SIGN IN FUNCTION
        async function signIn() {
            const email = document.getElementById('email-field').value;
            const pass = document.getElementById('pass-field').value;
            updateStatus("Checking Credentials...");

            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            
            if (error) {
                updateStatus("Login Error", "#ff4d4d");
                alert(error.message);
            } else {
                window.location.reload();
            }
        }

        // SIGN OUT FUNCTION
        async function signOut() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        // IDENTITY LOOKUP LOGIC
        async function verifyUser() {
            // Check if user is logged in
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                // UI Switch
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('profile-section').style.display = 'block';
                document.getElementById('current-email').innerText = user.email;
                
                updateStatus("Searching Database...");

                // LOOKUP: Finding row where 'email' matches the login email
                const { data, error } = await supabase
                    .from('citizens')
                    .select('full_name, citizen_number')
                    .eq('email', user.email)
                    .single();

                if (error) {
                    console.error("Database Error:", error);
                    updateStatus("No Match Found", "#ffaa00");
                    document.getElementById('display-name').innerText = "Unregistered";
                    document.getElementById('display-number').innerText = "VCS-PENDING";
                } else if (data) {
                    updateStatus("Citizen Verified", "#D4AF37");
                    document.getElementById('display-name').innerText = data.full_name;
                    document.getElementById('display-number').innerText = data.citizen_number;
                }
            } else {
                updateStatus("Offline");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').innerText = new Date().getFullYear();
            verifyUser();
        });
    </script>
</body>
</html>
