<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project V | Command Center</title>
    
    <!-- Persistence & Style -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- LAYER 1: Deep Canvas (Persistent Starfield) -->
    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <!-- LAYER 2: App Container (Centered & Wide) -->
    <main id="app-wrapper">

        <!-- LAYER 3: Sticky Glass Header -->
        <header id="top-glass-panel" class="glass-module">
            <div class="citizen-status">
                <a href="hub.html" class="back-btn">← RETURN TO HUB</a>
                <h1 id="user-greeting">Settings</h1>
            </div>
        </header>

        <!-- LAYER 4: Modular Command Tiles -->
        <section id="directory-core">
            <div id="directory-list">
                
                <!-- IDENTITY MODULE -->
                <div class="link-card">
                    <h3 class="card-title">Identity</h3>
                    <p class="card-desc" id="profile-info">
                        Citizen Name: Loading...<br>
                        Connection: Synchronizing...
                    </p>
                    <input type="text" id="new-name" placeholder="Update Hero Name" class="settings-input">
                    <button onclick="updateName()" class="card-btn">Update Identity</button>
                </div>

                <!-- SECURITY MODULE -->
                <div class="link-card">
                    <h3 class="card-title">Security</h3>
                    <p class="card-desc">Manage your encrypted connection and sanctuary access keys.</p>
                    <div class="button-group">
                        <button onclick="sendRestoreLink()" class="card-btn">Restore Link</button>
                        <button onclick="signOut()" class="card-btn secondary">Sign Out</button>
                    </div>
                </div>

                <!-- MAINTENANCE MODULE -->
                <div class="link-card">
                    <h3 class="card-title">Maintenance</h3>
                    <p class="card-desc">If the interface feels unstable or localized data is desynced, use the protocols below.</p>
                    <div class="button-group">
                        <button onclick="clearCache()" class="card-btn">Purify Cache</button>
                        <button onclick="fullReset()" class="card-btn danger">Clean Slate</button>
                    </div>
                </div>

            </div>
        </section>

        <!-- LAYER 5: System Footer -->
        <footer id="bottom-glass-panel" class="glass-module">
            <div class="footer-container">
                <p class="footer-msg active">Project V Build: 1.0.4 &copy; <span id="current-year"></span></p>
            </div>
        </footer>

    </main>

    <!-- Unified Logic Script -->
    <script src="app.js"></script>
</body>
</html>
