<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Your Settings</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <main id="app-wrapper">

        <!-- HEADER -->
        <header id="top-glass-panel" class="glass-module">
            <div class="citizen-status">
                <a href="hub.html" class="back-btn">← GO BACK</a>
                <h1 id="user-greeting">Settings</h1>
            </div>
        </header>

        <!-- THE UNIFIED SCENE -->
        <section id="directory-core">
            <div id="directory-list">
                
                <!-- YOUR NAME -->
                <div class="link-card">
                    <h3 class="card-title">Who are you?</h3>
                    <p class="card-desc" id="profile-info">
                        Name: Loading...<br>
                        Email: Loading...
                    </p>
                    <input type="text" id="new-name" placeholder="Type a new name..." class="settings-input">
                    <button onclick="updateName()" class="card-btn">Save Name</button>
                </div>

                <!-- SECURITY -->
                <div class="link-card">
                    <h3 class="card-title">Keep it safe</h3>
                    <p class="card-desc">Need to get back in or leave for a while?</p>
                    <div class="button-group">
                        <button onclick="sendRestoreLink()" class="card-btn">Email Login Link</button>
                        <button onclick="signOut()" class="card-btn secondary">Sign Out</button>
                    </div>
                </div>

                <!-- FIXING STUFF -->
                <div class="link-card">
                    <h3 class="card-title">Is it broken?</h3>
                    <p class="card-desc">If the app looks weird or things aren't loading right, try these.</p>
                    <div class="button-group">
                        <button onclick="clearCache()" class="card-btn">Fix My App</button>
                        <button onclick="fullReset()" class="card-btn danger">Start Over</button>
                    </div>
                </div>

            </div>
        </section>

        <!-- SYSTEM FOOTER -->
        <footer id="bottom-glass-panel" class="glass-module">
            <div class="footer-container">
                <p class="footer-msg active">Vanguard Version 1.0.4 &copy; <span id="current-year"></span></p>
            </div>
        </footer>

    </main>

    <script src="app.js"></script>
</body>
</html>
