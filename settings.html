<button class="btn-pill btn-inactive" onclick="toggleRestoreMode()" id="restore-toggle-btn">RESTORE FORGOTTEN ACCOUNT</button>

<div id="restore-area" style="display: none; border-top: 1px solid #444; margin-top: 20px; padding-top: 20px;">
    <h3 class="mono" style="font-size: 0.9rem; color: var(--v-gold);">ACCOUNT RECOVERY</h3>
    <div class="field-group">
        <label>Registered Email</label>
        <input type="email" id="r-email">
    </div>
    <div class="field-group">
        <label>Full Name on Record</label>
        <input type="text" id="r-name">
    </div>
    <button class="btn-pill btn-active" onclick="initiateRestore()">VERIFY & SEND RECOVERY LINK</button>
    <button class="btn-pill btn-inactive" onclick="toggleRestoreMode()">CANCEL</button>
</div>

<script>
    // --- RESTORE LOGIC ---
    function toggleRestoreMode() {
        const area = document.getElementById('restore-area');
        const auth = document.getElementById('auth-area');
        if(area.style.display === 'none') {
            area.style.display = 'block';
            auth.style.display = 'none';
        } else {
            area.style.display = 'none';
            auth.style.display = 'block';
        }
    }

    async function initiateRestore() {
        const email = document.getElementById('r-email').value.trim();
        const name = document.getElementById('r-name').value.trim();

        if(!email || !name) return msg("Both fields required for recovery.", "red");

        msg("Verifying Identity...", "#888");

        // 1. Check if Name and Email match in the Ledger
        const { data, error } = await supabaseClient
            .from('citizens')
            .select('email')
            .eq('email', email)
            .eq('full_name', name)
            .single();

        if (error || !data) {
            return msg("Verification Failed: Credentials do not match our records.", "red");
        }

        // 2. Trigger Supabase Password Reset
        const { error: resetError } = await supabaseClient.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.href // Returns them back to settings to set new pass
        });

        if (resetError) {
            msg("Recovery Error: " + resetError.message, "red");
        } else {
            msg("Recovery Link Sent! Check your email to reset your password.", "var(--v-gold)");
            playSuccessSound();
        }
    }
</script>
