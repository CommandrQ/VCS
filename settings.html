<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard | Settings</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass-card { display: flex; flex-direction: column; align-items: center; gap: 25px; padding: 40px; }
        .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .white-divider { width: 100%; height: 1px; background: #fff; box-shadow: 0 0 10px #fff, 0 0 5px #fff; border: none; }
        .scroll-area { width: 100%; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; max-height: 350px; padding-right: 10px; }
        input { width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 14px; color: white; }
    </style>
</head>
<body>
    <div class="universe"><div class="star-layer"></div></div>
    <header style="text-align:center; padding: 20px;"><h1 class="gold-text-outline">Identity Settings</h1></header>
    <main>
        <div class="glass-card animate-wake" id="settings-card">
            <div style="text-align: center;">
                <h3 id="display-role" style="color: var(--gold); font-size: 0.7rem; text-transform: uppercase;">---</h3>
                <h1 id="display-name">---</h1>
            </div>
            <div class="button-row">
                <a href="directory.html" class="gold-pill">Directory</a>
                <a href="support.html" class="gold-pill">Support</a>
            </div>
            <hr class="white-divider">
            <div class="scroll-area">
                <input type="text" id="f-handle" placeholder="Callsign">
                <input type="text" id="f-discord" placeholder="Discord ID">
                <button class="gold-pill" onclick="updateProfile()">Save Changes</button>
                <button class="gold-pill" onclick="handleLogout()" style="border-color:#f87171; color:#f87171;">Logout</button>
            </div>
        </div>
    </main>
    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function syncSettings() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            const { data } = await supabaseClient.from('citizens').select('*').eq('auth_id', session.user.id).single();
            if (data) {
                document.getElementById('display-name').innerText = data.full_name;
                document.getElementById('display-role').innerText = data.role || "Citizen";
                document.getElementById('f-handle').value = data.handle || "";
                document.getElementById('f-discord').value = data.discord_id || "";
            }
        }
        async function updateProfile() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            const updates = { handle: document.getElementById('f-handle').value, discord_id: document.getElementById('f-discord').value };
            await supabaseClient.from('citizens').update(updates).eq('auth_id', session.user.id);
            alert("Updated.");
        }
        async function handleLogout() { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; }
        window.onload = syncSettings;
    </script>
</body>
</html>
