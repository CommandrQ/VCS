<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Uplink Established</title>
    
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase Core is required here so it can catch and save the login token -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        .success-pulse {
            width: 150px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(74, 222, 128, 0.6)); /* Green pulse */
            animation: pulseGreen 3s ease-in-out infinite;
        }

        @keyframes pulseGreen {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(74, 222, 128, 0.4)); }
            50% { filter: drop-shadow(0 0 25px rgba(74, 222, 128, 0.8)); }
        }
    </style>
</head>
<body class="gate-body">

    <!-- Deep Canvas Background -->
    <div id="vanguard-universe" aria-hidden="true">
        <div class="gold-star-layer"></div>
    </div>

    <main id="app-wrapper" style="justify-content: center; align-items: center; background: transparent; box-shadow: none;">
        
        <div id="gate-interface" style="text-align: center; padding: 40px; width: 100%;">
            
            <img src="images/vanguardorglogo.png" alt="Vanguard Logo" class="success-pulse">
            
            <h1 style="font-size: 1.8rem; letter-spacing: 5px; color: var(--success); margin: 0; font-weight: 900; text-transform: uppercase;">Uplink Established</h1>
            
            <p style="font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-top: 20px; margin-bottom: 40px; line-height: 1.5;">
                Your device has been securely verified. <br>You may now close this terminal and return to the app.
            </p>

            <div style="display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px; margin: 0 auto;">
                
                <!-- Primary Action: Close Tab -->
                <button onclick="closeTerminal()" class="gate-button" style="border-color: var(--success) !important; color: var(--success) !important;">
                    Close Terminal
                </button>
                
                <!-- Fallback Action: Go to Hub manually if the browser blocks the close command -->
                <a href="hub.html" class="card-btn secondary" style="text-decoration: none;">Continue to Hub →</a>
                
            </div>
        </div>

    </main>

    <!-- Make sure app.js is loaded so it initializes Supabase and catches the session -->
    <script src="app.js"></script>
    <script>
        function closeTerminal() {
            // Attempt to close the window
            window.close();
            
            // If the browser blocks window.close(), update the text to guide them
            setTimeout(() => {
                alert("Your browser security prevents scripts from closing this tab automatically. Please close this tab manually or click 'Continue to Hub'.");
            }, 500);
        }
    </script>
</body>
</html>
