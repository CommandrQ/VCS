<script>
    const SB_URL = 'https://ushgtakupwrlbzzsbivv.supabase.co';
    const SB_KEY = 'YOUR_KEY_HERE'; // Use your eyJ... key
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function loadCitizenProfile() {
        const { data: { session } } = await _supabase.auth.getSession();
        
        if (!session) {
            window.location.href = 'index.html';
            return;
        }

        // 1. Fetch the Blueprint from your src folder
        const response = await fetch('./src/datafields.json');
        const fields = await response.json();

        // 2. Ask Supabase for the specific data in those fields
        // We create a string of IDs like "display_name, discord_tag, division"
        const columnQuery = fields.map(f => f.id).join(', ');
        
        const { data: profile, error } = await _supabase
            .from('profiles')
            .select(columnQuery)
            .eq('id', session.user.id)
            .single();

        if (error) {
            console.error("Error fetching profile:", error);
            return;
        }

        // 3. Display the info on the page
        const infoContainer = document.getElementById('user-info');
        infoContainer.innerHTML = ''; // Clear previous

        fields.forEach(field => {
            const value = profile[field.id] || 'Not Set';
            infoContainer.innerHTML += `
                <div class="info-row">
                    <strong>${field.label}:</strong> <span>${value}</span>
                </div>
            `;
        });
    }

    loadCitizenProfile();
</script>
