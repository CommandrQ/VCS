<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard | Citizen Ledger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="universe">
        <div class="star-layer layer-distant"></div>
    </div>

    <header class="vanguard-header">
        <h1 class="gold-text-outline" id="greeting" style="font-size: 1.6rem; text-transform: uppercase;">Citizen Ledger</h1>
    </header>

    <main>
        <div class="content-grid">
            
            <div class="glass-card">
                <h2>Verified Citizens</h2>
                <p>The core population of Fort Toward. Verified and synchronized.</p>
                
                <table class="tactical-table">
                    <thead>
                        <tr>
                            <th>Citizen</th>
                            <th>Rank</th>
                            <th>Handle</th>
                        </tr>
                    </thead>
                    <tbody id="directory-body">
                        </tbody>
                </table>
            </div>

            <div class="glass-card">
                <h2>Operational Intel</h2>
                <p>Real-time data regarding the Vanguard network status.</p>
                
                <div style="padding: 20px 0; border-top: 1px solid var(--glass-border);">
                    <h3 style="color: var(--gold); font-size: 0.9rem;">Population Count</h3>
                    <p id="stat-count" style="font-size: 2rem; font-weight: 800;">--</p>
                </div>

                <div style="padding: 20px 0; border-top: 1px solid var(--glass-border);">
                    <h3 style="color: var(--gold); font-size: 0.9rem;">Fort Status</h3>
                    <p style="color: #39ff14; font-weight: 800; letter-spacing: 2px;">SECURE</p>
                </div>

                <a href="settings.html" class="btn-pill-centered">UPDATE PROFILE</a>
            </div>

        </div>
    </main>

    <footer class="vanguard-footer">
        <p>Vanguard OS v4.7 Prime | Mission Critical Data</p>
    </footer>

    <script>
        // --- CONFIG ---
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // --- IDENTITY & LOCKDOWN ---
        async function runPreflight() {
            // 1. Check Maintenance Switch
            const { data: config } = await supabaseClient.from('system_config').select('value_bool').eq('key', 'site_online').single();
            if (config && config.value_bool === false) window.location.href = 'uc.html';

            // 2. Personalize Greeting
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data: citizen } = await supabaseClient.from('citizens').select('full_name').eq('auth_id', session.user.id).single();
                if (citizen) document.getElementById('greeting').innerText = `Ledger: ${citizen.full_name}`;
            }
        }

        // --- FETCH CITIZENS ---
        async function fetchLedger() {
            const tbody = document.getElementById('directory-body');
            const statCount = document.getElementById('stat-count');

            const { data, error } = await supabaseClient
                .from('citizens')
                .select('full_name, rank, handle')
                .order('created_at', { ascending: false });

            if (error) {
                tbody.innerHTML = '<tr><td colspan="3">Sync Error</td></tr>';
                return;
            }

            // Update Stats Card
            statCount.innerText = data.length;

            // Populate Main Card
            tbody.innerHTML = '';
            data.forEach(citizen => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-weight:700;">${citizen.full_name}</td>
                    <td><span class="rank-pill">${citizen.rank || 'Citizen'}</span></td>
                    <td style="font-family:monospace; color:var(--text-dim);">@${citizen.handle || '---'}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // --- REFRESH LOGIC ---
        window.addEventListener('pageshow', (e) => {
            if (e.persisted || window.performance.navigation.type === 2) window.location.reload();
        });

        window.onload = () => {
            runPreflight();
            fetchLedger();
        };
    </script>
</body>
</html>
