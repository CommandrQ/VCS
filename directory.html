<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard | Citizen Directory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- LAYOUT REFINEMENTS --- */
        .glass-card {
            display: flex; flex-direction: column; align-items: center; gap: 25px;
            padding: 40px; max-height: 90vh;
        }

        /* 1. Population Header */
        .pop-display { text-align: center; width: 100%; }
        #pop-count { font-size: 3.5rem; font-weight: 900; line-height: 1; margin-top: 10px; }

        /* 2. Direct Buttons */
        .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }

        /* 3. White Glowing Divider */
        .white-divider {
            width: 100%; height: 1px; background: #fff; border: none;
            box-shadow: 0 0 10px #fff, 0 0 5px #fff; margin: 5px 0; opacity: 0.9;
        }

        /* 4. Scrollable Category Grid */
        .scroll-grid {
            width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            overflow-y: auto; padding-right: 5px; max-height: 250px;
        }
        .scroll-grid::-webkit-scrollbar { width: 3px; }
        .scroll-grid::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .category-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 18px 10px; border-radius: 15px; font-size: 0.75rem; 
            font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .category-btn:hover { border-color: #fff; background: rgba(255, 255, 255, 0.08); }

        /* MODAL (POPUPS) */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px;
        }
        .modal-content {
            background: #050505; border: 1px solid var(--gold); border-radius: 28px;
            width: 100%; max-width: 450px; max-height: 70vh; padding: 30px;
            display: flex; flex-direction: column; gap: 20px;
        }
        #modal-body { overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        @media (max-width: 480px) { .button-row, .scroll-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="universe"><div class="star-layer"></div></div>

    <header class="vanguard-header" style="text-align:center; padding: 20px;">
        <h1 id="welcome-text" class="gold-text-outline" style="text-transform: uppercase; font-size: 1.1rem; letter-spacing: 2px;">Vanguard Network</h1>
    </header>

    <main>
        <div class="glass-card animate-wake" id="main-hub" style="opacity: 0;">
            
            <div class="pop-display">
                <h3 style="color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;">Active Population</h3>
                <h1 id="pop-count">--</h1>
            </div>

            <div class="button-row">
                <a href="support.html" class="gold-pill">Customer Service</a>
                <a href="settings.html" class="gold-pill">Settings</a>
            </div>

            <hr class="white-divider">

            <div class="scroll-grid">
                <button class="category-btn" onclick="openPopup('Tech Help')">Tech Help</button>
                <button class="category-btn" onclick="openPopup('Network Intel')">Network Intel</button>
                <button class="category-btn" onclick="openPopup('Citizen Perks')">Citizen Perks</button>
                <button class="category-btn" onclick="openPopup('Archives')">Archives</button>
            </div>

        </div>
    </main>

    <footer class="vanguard-footer">
        <p id="footer-text">Powered Vanguard Citizen Services © 2026</p>
    </footer>

    <div class="modal-overlay" id="modal-overlay" onclick="if(event.target.id==='modal-overlay') closePopup()">
        <div class="modal-content">
            <h2 id="modal-title" style="color: var(--gold); border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 10px; font-size: 1.1rem; text-transform: uppercase;">Category</h2>
            <div id="modal-body"></div>
            <button class="gold-pill" onclick="closePopup()" style="border-color: #333; color: #666; font-size: 0.7rem; width: 100%;">CLOSE TERMINAL</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const DATABASE = {
            "Tech Help": [{ title: "Vanguard Support", desc: "Technical hardware and software resolution.", url: "https://vsr.vcscitizen.org" }],
            "Network Intel": [{ title: "Node Status", desc: "Encrypted view of system uptime.", url: "#" }],
            "Citizen Perks": [{ title: "Vanguard Rewards", desc: "Rank-based benefit distribution.", url: "#" }],
            "Archives": [{ title: "The Ledger", desc: "Historical records of the Vanguard network.", url: "#" }]
        };

        // --- 1. OPTIMIZED SECURITY GATE ---
        async function runGatekeeper() {
            try {
                // Check session first
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) { window.location.href = 'index.html'; return; }

                // Check site status
                const { data: config } = await supabaseClient.from('system_config').select('value_bool').eq('key', 'site_online').single();
                const isOnline = config ? config.value_bool : true;

                if (isOnline) {
                    revealPage();
                } else {
                    // Only check role if site is offline
                    const { data: citizen } = await supabaseClient.from('citizens').select('role').eq('auth_id', session.user.id).single();
                    if (citizen && citizen.role === 'Command') {
                        revealPage();
                    } else {
                        window.location.href = 'https://vcscitizen.org/uc.html';
                    }
                }
            } catch (e) {
                window.location.href = 'index.html';
            }
        }

        function revealPage() {
            document.getElementById('main-hub').style.opacity = '1';
            syncData();
            runFooter();
        }

        // --- 2. DATA SYNC ---
        async function syncData() {
            // Pop Count
            const { count } = await supabaseClient.from('citizens').select('*', { count: 'exact', head: true });
            if (count !== null) document.getElementById('pop-count').innerText = count;

            // Welcome Text
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data } = await supabaseClient.from('citizens').select('full_name').eq('auth_id', session.user.id).single();
                if (data) document.getElementById('welcome-text').innerText = `Welcome, ${data.full_name.split(' ')[0]}`;
            }
        }

        // --- 3. POPUP MODAL LOGIC ---
        function openPopup(cat) {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = cat;
            body.innerHTML = '';
            
            if (DATABASE[cat]) {
                DATABASE[cat].forEach(item => {
                    const div = document.createElement('div');
                    div.style.cssText = "background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; border:1px solid rgba(255,255,255,0.05);";
                    div.innerHTML = `
                        <h3 style="color:var(--gold); font-size:0.9rem; margin-bottom:5px;">${item.title}</h3>
                        <p style="color:#888; font-size:0.75rem; margin-bottom:10px;">${item.desc}</p>
                        <a href="${item.url}" class="gold-pill" style="padding: 6px 15px; font-size: 0.6rem; width:fit-content;">OPEN ➞</a>
                    `;
                    body.appendChild(div);
                });
            }
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closePopup() { document.getElementById('modal-overlay').style.display = 'none'; }

        // --- 4. EXTRAS ---
        function runFooter() {
            const el = document.getElementById('footer-text');
            const motto = "Empower . Elevate . Educate";
            const original = "Powered Vanguard Citizen Services © 2026";
            setInterval(() => {
                el.style.opacity = '0';
                setTimeout(() => {
                    el.innerText = (el.innerText === original) ? motto : original;
                    el.style.opacity = '1';
                }, 600);
            }, 6000);
        }

        window.onload = runGatekeeper;
        
        // Auto refresh
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') syncData(); });
        setInterval(syncData, 30000);
    </script>
</body>
</html>
