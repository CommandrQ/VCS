<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard | Directory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass-card { display: flex; flex-direction: column; align-items: center; gap: 25px; padding: 40px; }
        #pop-count { font-size: 3.5rem; font-weight: 900; margin-top: 10px; }
        .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .white-divider { width: 100%; height: 1px; background: #fff; box-shadow: 0 0 10px #fff, 0 0 5px #fff; margin: 5px 0; border: none; }
        .scroll-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; max-height: 250px; padding-right: 5px; }
        .category-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 18px 10px; border-radius: 15px; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .category-btn:hover { border-color: #fff; background: rgba(255, 255, 255, 0.08); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { background: #050505; border: 1px solid var(--gold); border-radius: 28px; width: 100%; max-width: 450px; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
    </style>
</head>
<body>
    <div class="universe"><div class="star-layer"></div></div>
    <header style="text-align:center; padding: 20px;">
        <h1 id="welcome-text" class="gold-text-outline" style="text-transform: uppercase; font-size: 1.1rem; letter-spacing: 2px;">Vanguard Network</h1>
    </header>
    <main>
        <div class="glass-card animate-wake" id="directory-card">
            <div style="text-align: center; width: 100%;">
                <h3 style="color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;">Active Population</h3>
                <h1 id="pop-count">--</h1>
            </div>
            <div class="button-row">
                <a href="support.html" class="gold-pill">Customer Service</a>
                <a href="settings.html" class="gold-pill">Settings</a>
            </div>
            <hr class="white-divider">
            <div class="scroll-grid">
                <button class="category-btn" onclick="openPopup('Tech Help')">Tech Help</button>
                <button class="category-btn" onclick="openPopup('Archives')">Archives</button>
            </div>
        </div>
    </main>
    <footer class="vanguard-footer"><p id="footer-text">Powered Vanguard Citizen Services © 2026</p></footer>

    <div class="modal-overlay" id="modal-overlay" onclick="if(event.target.id==='modal-overlay') closePopup()">
        <div class="modal-content">
            <h2 id="modal-title" style="color: var(--gold); border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 10px; text-transform: uppercase;">Category</h2>
            <div id="modal-body"></div>
            <button class="gold-pill" onclick="closePopup()" style="width: 100%;">CLOSE</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        const DATABASE = { "Tech Help": [{ title: "Support", desc: "Technical resolution.", url: "https://vsr.vcscitizen.org" }], "Archives": [{ title: "The Ledger", desc: "Historical records.", url: "#" }] };

        async function syncData() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            const { count } = await supabaseClient.from('citizens').select('*', { count: 'exact', head: true });
            if (count !== null) document.getElementById('pop-count').innerText = count;
            const { data } = await supabaseClient.from('citizens').select('full_name').eq('auth_id', session.user.id).single();
            if (data) document.getElementById('welcome-text').innerText = `Welcome, ${data.full_name.split(' ')[0]}`;
        }

        function openPopup(cat) {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = cat;
            body.innerHTML = '';
            if (DATABASE[cat]) {
                DATABASE[cat].forEach(item => {
                    const div = document.createElement('div');
                    div.style.cssText = "background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; margin-bottom:10px;";
                    div.innerHTML = `<h3>${item.title}</h3><p>${item.desc}</p><a href="${item.url}" class="gold-pill">OPEN ➞</a>`;
                    body.appendChild(div);
                });
            }
            document.getElementById('modal-overlay').style.display = 'flex';
        }
        function closePopup() { document.getElementById('modal-overlay').style.display = 'none'; }
        window.onload = () => { syncData(); setInterval(syncData, 30000); };
    </script>
</body>
</html>
