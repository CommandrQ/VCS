<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fort Toward | Directory</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html {
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
            margin: 0;
        }

        /* --- THE NAVIGATION TUNER --- */
        .tuner-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
        }

        .category-nav {
            display: flex;
            gap: 15px;
            padding: 20px 40px;
            overflow-x: auto;
            scrollbar-width: none;
            scroll-behavior: smooth;
            white-space: nowrap;
            width: 100%;
            justify-content: center; /* Centered for few items */
        }
        
        /* Forces scroll start if more than 3 buttons */
        .category-nav > button {
            flex: 0 0 auto;
            min-width: 140px;
        }

        .category-nav::-webkit-scrollbar { display: none; }

        /* --- ANIMATED SCROLL ARROW --- */
        .scroll-arrow {
            position: absolute;
            right: 15px;
            color: var(--v-gold);
            font-size: 1.5rem;
            pointer-events: none;
            animation: arrowPulse 2s infinite;
            display: none; /* Only shows via JS if overflow exists */
        }

        @keyframes arrowPulse {
            0%, 100% { opacity: 0.3; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(5px); }
        }

        /* --- BUTTON STATES: FIXED --- */
        .btn-pill {
            font-family: inherit;
            font-weight: 900;
            padding: 12px 24px;
            font-size: 0.9rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s var(--v-curve);
        }

        .btn-inactive {
            background: transparent !important;
            border: 1px solid #444 !important;
            color: #888 !important;
        }

        .btn-active {
            background: var(--v-gold) !important;
            border: 1px solid var(--v-gold) !important;
            color: #000 !important;
            box-shadow: 0 4px 0 #8a6d0d;
        }

        /* --- CONTENT VIEWPORT --- */
        .os-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .portal-card {
            background: #0a0a0a;
            border: 1px solid #333;
            border-left: 5px solid var(--v-gold);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 20px 20px 40px rgba(0,0,0,1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 25px;
            animation: systemWake 0.6s var(--v-curve) forwards;
        }

        /* --- FOOTER --- */
        .vanguard-footer {
            border-top: 2px solid #222;
            padding: 20px;
            background: #000;
        }

        /* MOBILE OVERRIDES */
        @media (max-width: 650px) {
            .category-nav { justify-content: flex-start; padding: 20px; }
            .scroll-arrow { display: block; } /* Always nudge on mobile */
            .portal-card { flex-direction: column; text-align: left; }
            .header-content { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body class="fixed-hud">

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <header class="hud-header">
        <div class="header-content" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="images/vanguardorglogo.png" alt="VCS" style="width:35px;">
                <span class="gold-text-outline" style="font-size: 1.2rem;">Fort Toward Directory</span>
            </div>
            <nav>
                <button class="btn-pill btn-active" style="padding: 8px 20px; font-size: 0.75rem;" onclick="location.href='support.html'">CUSTOMER SERVICE</button>
            </nav>
        </div>
    </header>

    <div class="tuner-wrapper">
        <nav class="category-nav" id="category-row">
            </nav>
        <div class="scroll-arrow" id="nav-arrow">➔</div>
    </div>

    <main class="os-viewport" id="portal-feed"></main>

    <footer class="vanguard-footer">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; width: 100%;">
            <p style="color: #FFF; font-size: 0.8rem; margin: 0;">&copy; 2026 VANGUARD CITIZEN SERVICES</p>
            <a href="settings.html" style="color:#FFF; text-decoration:none; font-weight:bold; font-size: 1rem;">⚙️ SYSTEM SETTINGS</a>
        </div>
    </footer>

    <script>
        const VANGUARD_DB = {
            "Services": [
                { title: "Network Triage", tag: "Tech Help", desc: "Expert WiFi and network setup. We ensure your digital perimeter is secure.", link: "support.html", btnText: "REQUEST HELP" }
            ],
            "Partner Alliances": [
                { title: "Hardin Tech Solutions", tag: "Certified Partner", desc: "Local commercial IT specialists authorized for enterprise deployments.", link: "https://hardintech.com", btnText: "VISIT SITE" }
            ],
            "Academy": [
                { title: "Sovereign Skills", tag: "Education", desc: "Learn to repair hardware and protect your digital identity.", link: "https://git.vanguard.org/academy", btnText: "START LEARNING" }
            ],
            "Volunteers": [
                { title: "Community Hands", tag: "Citizenship", desc: "Request assistance for local physical projects or community events.", link: "support.html", btnText: "REQUEST CREW" }
            ]
        };

        const navRow = document.getElementById('category-row');
        const feed = document.getElementById('portal-feed');
        const arrow = document.getElementById('nav-arrow');

        // Render Buttons
        Object.keys(VANGUARD_DB).forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.innerText = cat;
            btn.className = index === 0 ? 'btn-pill btn-active' : 'btn-pill btn-inactive';
            btn.onclick = () => switchCategory(cat, btn);
            navRow.appendChild(btn);
            if (index === 0) renderCards(cat);
        });

        // Show arrow if content overflows
        function checkOverflow() {
            if (navRow.scrollWidth > navRow.clientWidth) {
                arrow.style.display = 'block';
            } else {
                arrow.style.display = 'none';
            }
        }

        function switchCategory(cat, targetBtn) {
            document.querySelectorAll('#category-row button').forEach(b => b.className = 'btn-pill btn-inactive');
            targetBtn.className = 'btn-pill btn-active';
            renderCards(cat);
        }

        function renderCards(cat) {
            feed.innerHTML = '';
            VANGUARD_DB[cat].forEach(item => {
                const card = document.createElement('section');
                card.className = 'portal-card';
                card.innerHTML = `
                    <div style="flex: 1;">
                        <div style="font-size: 0.85rem; color: var(--v-gold); font-weight: 700; margin-bottom: 5px;">${item.tag}</div>
                        <h2 style="font-size: 1.5rem; color: #fff; margin-bottom: 12px;">${item.title}</h2>
                        <p style="font-size: 1.15rem; color: #ddd; line-height: 1.6;">${item.desc}</p>
                    </div>
                    <a href="${item.link}" class="btn-pill btn-active" style="padding: 15px 30px; font-size: 0.9rem; text-decoration: none;">${item.btnText}</a>
                `;
                feed.appendChild(card);
            });
        }

        window.onload = checkOverflow;
        window.onresize = checkOverflow;
    </script>
</body>
</html>
