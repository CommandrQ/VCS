<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard | Citizen Directory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="universe"><div class="star-layer"></div></div>

    <header class="vanguard-header" style="padding: 20px; text-align: center;">
        <h1 id="welcome-text" class="gold-text-outline" style="text-transform: uppercase; font-size: 1.2rem; letter-spacing: 1px;">Welcome, Citizen</h1>
    </header>

    <main>
        <div class="glass-card">
            <div style="text-align: center;">
                <h3 style="color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;">Active Population</h3>
                <h1 id="pop-count" style="font-size: 3rem; font-weight: 900;">--</h1>
            </div>

            <div class="resource-grid">
                <a href="support.html" class="gold-pill">Customer Service</a>
                <a href="settings.html" class="gold-pill">Settings</a>
            </div>

            <hr class="white-divider">

            <div class="resource-grid" style="overflow-y: auto; max-height: 30vh; padding: 5px;">
                <button class="category-btn" onclick="openResourceModal('Tech Help')">Tech Help</button>
                <button class="category-btn" onclick="openResourceModal('Network Intel')">Network Intel</button>
                </div>
        </div>
    </main>

    <footer class="vanguard-footer">
        <p id="footer-text">Powered Vanguard Citizen Services © 2026</p>
    </footer>

    <div class="modal-overlay" id="modal-overlay" onclick="if(event.target.id==='modal-overlay') closeModal()">
        <div class="modal-content">
            <h2 id="modal-title" style="color: var(--gold); border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 10px; font-size: 1.1rem; text-transform: uppercase;"></h2>
            <div id="modal-body"></div>
            <button class="gold-pill" onclick="closeModal()" style="border-color: #333; color: #666; font-size: 0.7rem;">CLOSE WINDOW</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const DATABASE = {
            "Tech Help": [
                { title: "Vanguard Support & Repair", desc: "Hardware repair and software support.", url: "https://vsr.vcscitizen.org" }
            ],
            "Network Intel": [
                { title: "Node Status", desc: "Real-time view of network uptime.", url: "#" }
            ]
        };

        // --- DATA SYNC & AUTO-REFRESH ---
        async function syncData() {
            // 1. Population Count
            const { count, error } = await supabaseClient.from('citizens').select('*', { count: 'exact', head: true });
            if (!error) document.getElementById('pop-count').innerText = count;

            // 2. Auth Greeting
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data } = await supabaseClient.from('citizens').select('full_name').eq('auth_id', session.user.id).single();
                if (data) document.getElementById('welcome-text').innerText = `Welcome, ${data.full_name.split(' ')[0]}`;
            }
        }

        // Auto-refresh data every 30 seconds
        setInterval(syncData, 30000);

        // Auto-refresh when user comes back to the tab
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') syncData();
        });

        // --- MODAL LOGIC ---
        function openResourceModal(cat) {
            const modal = document.getElementById('modal-overlay');
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = cat;
            body.innerHTML = '';
            
            if (DATABASE[cat]) {
                DATABASE[cat].forEach(item => {
                    const div = document.createElement('div');
                    div.style.background = 'rgba(255,255,255,0.03)';
                    div.style.padding = '15px';
                    div.style.borderRadius = '12px';
                    div.innerHTML = `<h3 style="color:var(--gold); font-size:1rem; margin-bottom:5px;">${item.title}</h3>
                                     <p style="color:var(--text-dim); font-size:0.8rem; margin-bottom:12px;">${item.desc}</p>
                                     <a href="${item.url}" class="gold-pill" style="padding: 8px 15px; font-size: 0.65rem; width:fit-content;">GO ➞</a>`;
                    body.appendChild(div);
                });
            }
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        // --- FOOTER ---
        function runFooter() {
            const el = document.getElementById('footer-text');
            const original = "Powered Vanguard Citizen Services © 2026";
            const motto = "Empower . Educate . Elevate";
            const cycle = () => {
                el.classList.add('footer-active');
                setTimeout(() => {
                    el.style.opacity = '0';
                    setTimeout(() => {
                        el.innerText = (el.innerText === original) ? motto : original;
                        el.classList.remove('footer-active');
                        el.style.opacity = '1';
                    }, 600);
                }, 2000);
            };
            setInterval(cycle, 6000);
        }

        window.onload = () => { syncData(); runFooter(); };
    </script>
</body>
</html>
