<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Command | Directory</title>
    <script>
        if (!document.cookie.split('; ').find(row => row.startsWith('vanguard_access='))) {
            window.location.href = 'index.html';
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="directory-body">

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <header class="hud-header">
        <div class="logo-area">
            <img src="images/vanguardorglogo.png" alt="VCS" class="hud-logo">
            <span class="gold-text">Operational Directory</span>
        </div>
        <nav class="hud-nav">
            <button onclick="location.href='projects.html'">PROJECTS</button>
            <button class="btn-gold" onclick="showRequestModal()">REQUEST SERVICE</button>
        </nav>
    </header>

    <div class="category-tuner" id="cat-bar">
        </div>

    <main class="dual-pane">
        <section class="pane">
            <h2 class="pane-title">VANGUARD RESOURCES (INTERNAL)</h2>
            <div class="list" id="res-list">
                </div>
        </section>

        <section class="pane">
            <h2 class="pane-title">AUTHORIZED ALLIANCES (PARTNERS)</h2>
            <div class="list" id="all-list">
                </div>
        </section>
    </main>

    <div id="request-modal" class="modal hidden">
        <div class="modal-box">
            <h3 class="gold-text">MISSION SIGNAL</h3>
            <p style="font-size: 0.7rem; color: #666;">Submit details for manual triage.</p>
            <textarea id="mission-details" placeholder="Describe the service required..."></textarea>
            <button class="btn-gold" onclick="submitSignal()">SUBMIT SIGNAL</button>
            <button class="btn-link" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

    <footer class="vanguard-footer">
        <p>&copy; 2026 Vanguard Citizen Services | Empower. Educate. Elevate.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
