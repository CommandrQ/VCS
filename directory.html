<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fort Toward | Directory</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html {
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        /* --- ACCESSIBILITY FIX: Subtle Scanlines behind text --- */
        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(255, 255, 255, 0.02) 50%);
            background-size: 100% 4px;
            z-index: 1; /* Moved behind content */
            pointer-events: none;
        }

        .hud-header {
            flex-shrink: 0;
            background: #000;
            border-bottom: 2px solid var(--v-gold);
            z-index: 10;
            width: 100%;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            width: 100%;
            box-sizing: border-box;
            z-index: 10;
        }

        /* --- LARGER, LEGIBLE TEXT --- */
        .gold-text-outline {
            color: var(--v-gold);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 1.1rem; /* Slightly larger for clarity */
        }

        .btn-slim {
            background: var(--v-gold);
            color: #000 !important;
            font-weight: 900;
            padding: 8px 20px;
            text-decoration: none;
            font-size: 0.85rem; /* Larger font for easy clicking */
            border-radius: 50px;
            box-shadow: 0 3px 0 #8a6d0d;
            border: none;
            cursor: pointer;
        }

        .os-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .portal-card {
            background: #0a0a0a; /* Solid black */
            border: 1px solid #333;
            border-left: 5px solid var(--v-gold);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 20px 20px 40px rgba(0,0,0,0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 25px;
            z-index: 5;
        }

        .card-desc {
            font-size: 1.1rem; /* Bumping up for older eyes */
            color: #ddd; /* Brighter grey for higher contrast */
            line-height: 1.6;
        }

        /* --- SYSTEM SETTINGS FOOTER --- */
        .vanguard-footer {
            border-top: 2px solid #222;
            padding: 20px;
            background: #000;
            z-index: 10;
        }

        .settings-link {
            color: #FFF;
            text-decoration: none;
            font-size: 0.9rem; /* Increased size */
            font-weight: 700;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .settings-link:hover { color: var(--v-gold); }

        /* --- MOBILE STACKING --- */
        @media (max-width: 650px) {
            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            .os-viewport { padding: 20px; }
            .portal-card { flex-direction: column; padding: 25px; }
            .btn-action { width: 100%; text-align: center; }
            
            /* Keep footer items from crowding */
            .footer-content {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body class="fixed-hud">

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <header class="hud-header">
        <div class="header-content">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="images/vanguardorglogo.png" alt="VCS" style="width:35px;">
                <span class="gold-text-outline">Fort Toward Directory</span>
            </div>
            <nav>
                <button class="btn-slim" onclick="location.href='support.html'">CUSTOMER SERVICE</button>
            </nav>
        </div>
    </header>

    <nav style="display: flex; gap: 10px; padding: 15px; overflow-x: auto; border-bottom: 1px solid #222; justify-content: center;" id="category-row">
        </nav>

    <main class="os-viewport" id="portal-feed">
        </main>

    <footer class="vanguard-footer">
        <div class="footer-content" style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto;">
            <p style="color: #FFF; font-size: 0.75rem; margin: 0;">&copy; 2026 VANGUARD CITIZEN SERVICES</p>
            <a href="settings.html" class="settings-link">⚙️ SYSTEM SETTINGS</a>
        </div>
    </footer>

    <script>
        const VANGUARD_DB = {
            "Services": [
                { title: "Network Triage", tag: "Tech Help", desc: "Expert WiFi and network setup for your home or business. We ensure your digital perimeter is secure.", link: "support.html", btnText: "REQUEST HELP" }
            ],
            "Partner Alliances": [
                { title: "Hardin Tech Solutions", tag: "Certified Partner", desc: "Local commercial IT specialists authorized for enterprise-level Vanguard deployments.", link: "https://hardintech.com", btnText: "VISIT SITE" }
            ]
        };

        const navRow = document.getElementById('category-row');
        const feed = document.getElementById('portal-feed');

        Object.keys(VANGUARD_DB).forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-slim';
            btn.style.background = index === 0 ? 'var(--v-gold)' : '#111';
            btn.style.color = index === 0 ? '#000' : '#888';
            btn.innerText = cat;
            btn.onclick = (e) => switchCategory(cat, e.target);
            navRow.appendChild(btn);
        });

        function switchCategory(cat, targetBtn) {
            document.querySelectorAll('#category-row button').forEach(b => {
                b.style.background = '#111';
                b.style.color = '#888';
            });
            targetBtn.style.background = 'var(--v-gold)';
            targetBtn.style.color = '#000';

            feed.innerHTML = '';
            VANGUARD_DB[cat].forEach(item => {
                const card = document.createElement('section');
                card.className = 'portal-card';
                card.innerHTML = `
                    <div class="card-info">
                        <div style="font-size: 0.8rem; color: var(--v-gold); font-weight: 700; margin-bottom: 5px;">${item.tag}</div>
                        <h2 style="font-size: 1.4rem; color: #fff; margin-bottom: 10px;">${item.title}</h2>
                        <p class="card-desc">${item.desc}</p>
                    </div>
                    <a href="${item.link}" class="btn-slim" style="padding: 15px 30px; font-size: 0.9rem;">${item.btnText}</a>
                `;
                feed.appendChild(card);
            });
        }

        window.onload = () => switchCategory(Object.keys(VANGUARD_DB)[0], navRow.firstChild);
    </script>
</body>
</html>
