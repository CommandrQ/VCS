<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vanguard | Citizen Directory</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- LOCKED VIEWPORT ENGINE --- */
        html, body {
            margin: 0; padding: 0;
            height: 100dvh; /* Dynamic Viewport Height for mobile browsers */
            width: 100vw;
            overflow: hidden; /* Strict lock on the body */
            background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- ANIMATED STARFIELD --- */
        .universe-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); }
        .star-layer { position: absolute; inset: -500px; background-repeat: repeat; animation: starDrift linear infinite; }
        .stars-1 { background-image: radial-gradient(3.5px 3.5px at 25px 50px, #fff, transparent), radial-gradient(2.5px 2.5px at 150px 150px, #fff, transparent); background-size: 400px 400px; animation-duration: 160s; opacity: 0.4; }
        .stars-2 { background-image: radial-gradient(5px 5px at 200px 100px, var(--gold), transparent), radial-gradient(3px 3px at 350px 350px, var(--gold), transparent); background-size: 600px 600px; animation-duration: 110s; opacity: 0.25; }
        @keyframes starDrift { from { transform: translateY(0); } to { transform: translateY(500px); } }

        /* --- FLEXBOX CENTERING & MOBILE SAFE-ZONE --- */
        .viewport-wrapper {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; width: 100%;
            padding: 15px 15px 55px 15px; /* 55px bottom padding protects the footer */
            box-sizing: border-box;
        }

        /* --- SLOW ANNOUNCEMENT TICKER (1s Pause) --- */
        .announcement-ticker {
            width: 100%; max-width: 850px;
            flex: 0 0 auto; /* Prevent from shrinking */
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom: 2px solid var(--gold);
            border-radius: 12px 12px 0 0;
            padding: 10px 15px; box-sizing: border-box;
            overflow: hidden; white-space: nowrap;
            margin-bottom: -1px; z-index: 2;
        }
        .ticker-content {
            display: inline-block;
            color: #fff; font-size: 0.8rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1.5px;
            padding-left: 100%; /* Pushes text to start from the far right edge */
            /* 30s total animation. 96.6% = ~29s moving, 3.4% = ~1s pause */
            animation: tickerScroll 30s linear infinite;
        }
        @keyframes tickerScroll { 
            0% { transform: translateX(0); } 
            96.6% { transform: translateX(-100%); } /* Text exits far left */
            100% { transform: translateX(-100%); } /* 1 second pause */
        }

        /* --- BIG DIRECTORY CARD --- */
        .directory-terminal {
            width: 100%; max-width: 850px;
            flex: 1 1 auto; /* Allows the card to take remaining screen space */
            min-height: 0; /* CRITICAL FIX: Allows internal scrolling on mobile */
            display: flex; flex-direction: column;
            padding: 25px 25px 15px; gap: 20px;
            box-sizing: border-box; position: relative;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 0 24px 24px;
        }

        /* --- DYNAMIC POPULATION COUNTER --- */
        .pop-container { flex: 0 0 auto; text-align: center; width: 100%; }
        .pop-label { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        /* Font size uses 'min' to auto-shrink on small screens when numbers get huge */
        .pop-count { font-size: min(4rem, 12vw); font-weight: 900; color: #fff; margin: 5px 0 0; line-height: 1; transition: 0.5s; word-wrap: break-word; }
        .loading-count { opacity: 0.5; font-size: 2rem; }

        .white-divider { flex: 0 0 auto; width: 100%; height: 1px; background: #fff; border: none; box-shadow: 0 0 10px #fff; margin: 0; }

        /* --- CATEGORY SELECTOR --- */
        .category-menu {
            flex: 0 0 auto; width: 100%; display: flex; gap: 10px;
            overflow-x: auto; padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
            justify-content: flex-start;
        }
        @media (min-width: 750px) { .category-menu { justify-content: center; } }
        .category-menu::-webkit-scrollbar { height: 3px; }
        .category-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .cat-btn {
            flex: 0 0 auto; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 10px 20px; border-radius: 50px;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer; transition: 0.3s;
        }
        .cat-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: #fff; }
        .cat-btn.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        /* --- MINI CARDS CONTAINER (Scrolls perfectly now) --- */
        .directory-content {
            flex: 1 1 auto; /* Takes leftover space inside the big card */
            min-height: 0; /* CRITICAL FIX for mobile scroll */
            overflow-y: auto;
            width: 100%; padding-right: 5px;
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 15px; align-content: start;
        }
        .directory-content::-webkit-scrollbar { width: 4px; }
        .directory-content::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* --- MINI CARDS (Centered Layout) --- */
        .link-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 25px 20px;
            transition: 0.3s;
            display: flex; flex-direction: column; 
            align-items: center; /* Centers items horizontally */
            text-align: center; /* Centers text */
            gap: 12px;
        }
        .link-card:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(255,255,255,0.3); transform: translateY(-3px); }
        
        .card-title { color: #fff; font-size: 1.1rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 1px;}
        .card-desc { color: #aaa; font-size: 0.8rem; margin: 0; line-height: 1.5; flex-grow: 1; }
        
        .card-btn {
            margin-top: auto; /* Pushes button to bottom, keeps it centered */
            padding: 10px 25px; font-size: 0.75rem; width: auto;
        }

        /* --- ANIMATED FOOTER ENGINE --- */
        .vanguard-footer {
            position: fixed; bottom: 0; width: 100%;
            height: 40px; background: #000;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; overflow: hidden; pointer-events: none;
        }
        
        .footer-text-container { position: relative; width: 100%; text-align: center; }

        .footer-text {
            position: absolute; width: 100%; left: 0; top: 50%;
            transform: translateY(-50%);
            margin: 0; font-size: 0.75rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase; color: #fff;
            transition: opacity 1s, filter 1s;
        }

        /* Slice Animation for Motto */
        .motto-text {
            clip-path: inset(0 100% 0 0);
            transition: clip-path 1.5s var(--v-curve), opacity 1s;
            color: var(--gold);
        }

        /* Active states triggered by JS */
        .state-copyright .copyright-text { opacity: 1; filter: blur(0); }
        .state-copyright .motto-text { opacity: 0; filter: blur(5px); clip-path: inset(0 100% 0 0); }

        .state-motto .copyright-text { opacity: 0; filter: blur(5px); }
        .state-motto .motto-text { opacity: 1; filter: blur(0); clip-path: inset(0 0 0 0); }
    </style>
</head>
<body class="state-copyright">

    <div class="universe-bg">
        <div class="star-layer stars-1"></div>
        <div class="star-layer stars-2"></div>
    </div>

    <div class="viewport-wrapper">
        
        <div class="announcement-ticker">
            <div class="ticker-content">
                ::: - ::: - ::: MONITOR TERMINAL FOR UPDATES ::: END NOTICE :::
            </div>
        </div>

        <article class="directory-terminal animate-wake" id="main-terminal">
            
            <div class="pop-container">
                <div class="pop-label">Active Population</div>
                <h1 id="population-count" class="pop-count loading-count">Syncing...</h1>
            </div>

            <hr class="white-divider">

            <nav class="category-menu" id="category-bar">
                </nav>

            <div class="directory-content" id="directory-list">
                </div>
            
        </article>
    </div>

    <footer class="vanguard-footer">
        <div class="footer-text-container">
            <p class="footer-text copyright-text">Powered by Vanguard Citizen Services &copy; <span id="current-year"></span></p>
            <p class="footer-text motto-text">Empower . Educate . Elevate</p>
        </div>
    </footer>

    <script>
        // ==========================================
        // DIRECTORY CONFIGURATION
        // ==========================================
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const directoryData = {
            "Tech Help": [
                { title: "Vanguard Support & Repair", desc: "Simple tech help and education.", url: "https://vsr.vcscitizen.org/" }
            ],
            "System Menu": [
                { title: "Settings", desc: "Sync your account and contact cutomer service", url: "settings.html" }
            ]
        };

        const ui = {
            popCount: document.getElementById('population-count'),
            catBar: document.getElementById('category-bar'),
            dirList: document.getElementById('directory-list'),
            body: document.body
        };

        async function initSystem() {
            document.getElementById('current-year').innerText = new Date().getFullYear();
            fetchPopulation();
            setInterval(fetchPopulation, 15000); // Polling every 15s to save DB reads
            renderCategories();
            startFooterLoop();
        }

        // ==========================================
        // AUTO-ADJUSTING POPULATION SYNC
        // ==========================================
        async function fetchPopulation() {
            try {
                const { count, error } = await supabaseClient.from('citizens').select('*', { count: 'exact', head: true });
                if (error) throw error;
                
                // Formats the number (e.g. 1,000,000). The CSS clamp() handles the visual shrinking automatically
                ui.popCount.innerText = count.toLocaleString();
                ui.popCount.classList.remove('loading-count');
            } catch (err) {
                console.error("Ledger Sync Error:", err);
                ui.popCount.innerText = "OFFLINE";
                ui.popCount.style.color = "#f87171";
            }
        }

        // ==========================================
        // MINI CARDS ENGINE
        // ==========================================
        function renderCategories() {
            ui.catBar.innerHTML = '';
            const categories = Object.keys(directoryData);

            categories.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = `cat-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                ui.catBar.appendChild(btn);
            });

            if (categories.length > 0) renderCards(categories[0]);
        }

        function selectCategory(catName, btnEl) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');

            if(window.innerWidth < 750) {
                btnEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            renderCards(catName);
        }

        function renderCards(catName) {
            ui.dirList.style.opacity = 0;
            
            setTimeout(() => {
                ui.dirList.innerHTML = '';
                const resources = directoryData[catName];

                if (!resources || resources.length === 0) {
                    ui.dirList.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#888; padding: 20px;">Node empty.</p>';
                } else {
                    resources.forEach(res => {
                        const card = document.createElement('div');
                        card.className = 'link-card';
                        card.innerHTML = `
                            <h3 class="card-title">${res.title}</h3>
                            <p class="card-desc">${res.desc}</p>
                            <a href="${res.url}" class="gold-pill card-btn">Execute ➞</a>
                        `;
                        ui.dirList.appendChild(card);
                    });
                }
                ui.dirList.style.opacity = 1;
            }, 200); 
        }

        // ==========================================
        // ANIMATED FOOTER LOOP (3s Text + 3s Transition)
        // ==========================================
        function startFooterLoop() {
            setInterval(() => {
                if (ui.body.classList.contains('state-copyright')) {
                    ui.body.classList.remove('state-copyright');
                    ui.body.classList.add('state-motto');
                } else {
                    ui.body.classList.remove('state-motto');
                    ui.body.classList.add('state-copyright');
                }
            }, 6000); // 6s cycle gives roughly 3s of reading time per text
        }

        window.onload = initSystem;
    </script>
</body>
</html>
