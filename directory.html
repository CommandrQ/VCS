<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard | Citizen Directory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- PAGE ANIMATIONS --- */
        @keyframes smoothWake { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-wake { animation: smoothWake 0.7s var(--v-curve) forwards; opacity: 0; }
        @keyframes dataPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .loading-state { animation: dataPulse 1.5s ease-in-out infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-item { animation: fadeIn 0.4s var(--v-curve) forwards; opacity: 0; }

        /* --- 2-COLUMN GRID --- */
        .resource-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%;
            overflow-y: auto; max-height: 40vh; padding-right: 5px; -webkit-overflow-scrolling: touch;
        }
        .resource-grid::-webkit-scrollbar { width: 4px; }
        .resource-grid::-webkit-scrollbar-track { background: transparent; }
        .resource-grid::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }

        .resource-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main); padding: 15px 10px; border-radius: 12px; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .resource-btn:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); }

        /* --- MODAL (POPUP WINDOW) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-content {
            background: var(--card-bg); border: 1px solid var(--gold); border-radius: 20px;
            width: 100%; max-width: 450px; max-height: 80vh; overflow-y: hidden;
            padding: 30px; display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,1), 0 0 20px rgba(212, 175, 55, 0.15);
            transform: scale(0.95); transition: transform 0.3s var(--v-curve);
        }
        .modal-overlay.active { opacity: 1; }
        .modal-overlay.active .modal-content { transform: scale(1); }

        /* The rolling list container inside the modal */
        #modal-body {
            display: flex; flex-direction: column; gap: 15px; 
            overflow-y: auto; padding-right: 5px; -webkit-overflow-scrolling: touch;
        }
        #modal-body::-webkit-scrollbar { width: 4px; }
        #modal-body::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); border-radius: 4px; }

        .resource-item {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; border-radius: 12px; text-align: left; flex-shrink: 0;
        }
        .resource-item h3 { color: var(--gold); font-size: 1.1rem; margin-bottom: 8px; text-align: left; }
        .resource-item p { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 15px; text-align: left; }
        
        .modal-close {
            background: transparent; border: 1px solid #555; color: #fff;
            padding: 10px; border-radius: 50px; cursor: pointer; width: 100%;
            margin-top: 10px; font-weight: 700; transition: 0.3s; text-transform: uppercase; flex-shrink: 0;
        }
        .modal-close:hover { border-color: var(--error-red); color: var(--error-red); }

        @media (max-width: 480px) { .resource-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="universe"><div class="star-layer"></div></div>

    <header class="vanguard-header">
        <h1 id="welcome-text" class="gold-text-outline" style="font-size: 1.5rem; text-transform: uppercase; margin: 0; text-align: center; transition: opacity 0.5s;">Welcome, Citizen</h1>
    </header>

    <main>
        <div class="glass-card animate-wake">
            
            <div id="population-stat" style="width: 100%;">
                <h3 style="color: var(--gold); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;">Active Population</h3>
                <h1 id="pop-count" class="loading-state" style="font-size: 3rem; font-weight: 900; margin-top: 5px;">--</h1>
            </div>

            <hr style="width: 80%; border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">

            <h3 style="font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px;">Network Resources</h3>
            
            <div class="resource-grid" id="resource-buttons">
                <button class="resource-btn" onclick="openResourceModal('Tech Help')">Tech Help</button>
                <button class="resource-btn" onclick="openResourceModal('Cyber Intel')">Cyber Intel</button>
            </div>

        </div>
    </main>

    <footer class="vanguard-footer">
        <p id="footer-text">Powered Vanguard Citizen Services © 2026</p>
    </footer>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" id="modal-content">
            <h2 id="modal-title" style="margin-bottom: 10px; border-bottom: 1px solid var(--gold); padding-bottom: 10px; flex-shrink: 0;">Category</h2>
            
            <div id="modal-body"></div>
            
            <button class="modal-close" onclick="forceCloseModal()">CLOSE WINDOW</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://dvyjupytbwbrcoyouxpf.supabase.co';
        const SB_KEY = 'sb_publishable_wjgbPekKmodd5mSDXIeUeg_Wq73GzOk';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // ==========================================
        // STEP 2: ADD YOUR LINKS AND DESCRIPTIONS HERE
        // ==========================================
        const INTERNAL_DATABASE = {
            "Tech Help": [
                {
                    title: "Vanguard Support & Repair",
                    desc: "Simple tech help and support for local citizens.",
                    url: "https://vsr.vcscitizen.org"
                },
                {
                    title: "Hardware Requisitions",
                    desc: "Submit a form to request replacement parts or upgrades.",
                    url: "#"
                }
            ],
            "Cyber Intel": [
                {
                    title: "Security Threat Map",
                    desc: "Live view of known vulnerabilities and active network threats.",
                    url: "#"
                }
            ]
        };
        // ==========================================

        async function syncIdentity() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data } = await supabaseClient.from('citizens').select('full_name').eq('auth_id', session.user.id).single();
                if (data) {
                    const welcomeText = document.getElementById('welcome-text');
                    welcomeText.style.opacity = '0';
                    setTimeout(() => {
                        welcomeText.innerText = `Welcome, ${data.full_name.split(' ')[0]}`;
                        welcomeText.style.opacity = '1';
                    }, 250);
                }
            }
        }

        async function fetchPopulation() {
            const popCount = document.getElementById('pop-count');
            const { count, error } = await supabaseClient.from('citizens').select('*', { count: 'exact', head: true });
            
            if (!error) {
                popCount.classList.remove('loading-state');
                popCount.innerText = count;
            } else {
                popCount.classList.remove('loading-state');
                popCount.innerText = "ERR";
            }
        }

        function openResourceModal(category) {
            const modal = document.getElementById('modal-overlay');
            const modalTitle = document.getElementById('modal-title');
            const modalBody = document.getElementById('modal-body');

            // 1. Setup UI for Wake Animation
            modalTitle.innerText = category;
            modalBody.innerHTML = '<p class="loading-state" style="text-align: center; color: #888; font-family: monospace;">[ DECRYPTING INTEL ]</p>';
            
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10); 

            // 2. Simulate short load, then pull from INTERNAL_DATABASE
            setTimeout(() => {
                const resources = INTERNAL_DATABASE[category];

                if (resources && resources.length > 0) {
                    modalBody.innerHTML = ''; 
                    
                    resources.forEach((item, index) => {
                        const div = document.createElement('div');
                        div.className = 'resource-item fade-in-item';
                        div.style.animationDelay = `${index * 0.1}s`; 
                        div.innerHTML = `
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                            <a href="${item.url}" class="gold-pill" style="display: inline-block; text-align: center; width: auto; font-size: 0.75rem;">GO ➞</a>
                        `;
                        modalBody.appendChild(div);
                    });
                } else {
                    modalBody.innerHTML = '<p style="text-align: center; color: #888;">No active resources in this sector.</p>';
                }
            }, 400); // 400ms fake load time for tactical feel
        }

        function closeModal(event) {
            if (event.target.id === 'modal-overlay') forceCloseModal();
        }
        
        function forceCloseModal() { 
            const modal = document.getElementById('modal-overlay');
            modal.classList.remove('active');
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }

        function runFooterCycle() {
            const el = document.getElementById('footer-text');
            const original = `Powered Vanguard Citizen Services © ${new Date().getFullYear()}`;
            const motto = "Empower . Educate . Elevate";

            setInterval(() => {
                el.classList.add('footer-glow');
                setTimeout(() => { el.style.opacity = '0';
                    setTimeout(() => { el.innerText = motto; el.style.opacity = '1'; el.classList.remove('footer-glow');
                        setTimeout(() => { el.style.opacity = '0';
                            setTimeout(() => { el.innerText = original; el.style.opacity = '1'; }, 500);
                        }, 2000);
                    }, 500);
                }, 1000);
            }, 8000);
        }

        window.onload = () => {
            syncIdentity();
            fetchPopulation();
            runFooterCycle();
        };
    </script>
</body>
</html>
