<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard OS | System Directory</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html { overflow: hidden; height: 100%; display: flex; flex-direction: column; background: #000; margin: 0; }
        .window-pane { background: #050505; border-right: 2px solid var(--v-border); display: flex; flex-direction: column; height: 100%; }
        .window-header { background: #000; padding: 15px 20px; border-bottom: 2px solid var(--v-gold); flex-shrink: 0; }
        
        /* 3D Module Cards */
        .os-card {
            background: #111; border: 1px solid #222; padding: 20px; margin-bottom: 15px;
            border-left: 4px solid var(--v-gold); box-shadow: 10px 10px 20px rgba(0,0,0,0.8);
            transition: 0.3s; cursor: pointer; opacity: 0; animation: slideIn 0.5s ease forwards;
        }
        .os-card:hover { transform: translateX(8px); background: #181818; border-color: var(--v-gold); }

        .gold-text-outline {
            color: var(--v-gold); text-transform: uppercase; font-weight: 900;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }

        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 850px) {
            .hud-workspace { grid-template-columns: 1fr !important; overflow-y: auto; }
            .window-pane { height: auto; border-right: none; border-bottom: 2px solid #222; }
            body, html { overflow-y: auto; height: auto; }
        }
    </style>
</head>
<body class="fixed-hud">
    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <header class="hud-header" style="border-bottom: 2px solid var(--v-gold); padding: 12px 25px;">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div style="display: flex; align-items: center;">
                <img src="images/vanguardorglogo.png" alt="VCS" style="width:30px; margin-right:12px;">
                <span class="gold-text-outline">VANGUARD OS // DIRECTORY</span>
            </div>
            <button class="btn-pill-gold" onclick="location.href='support.html'" style="background:var(--v-gold); border-radius:50px; border:none; padding:8px 20px; font-weight:900; cursor:pointer;">SIGNAL DISPATCH</button>
        </div>
    </header>

    <main class="hud-workspace" style="display: grid; grid-template-columns: 1fr 1.5fr; flex: 1; overflow: hidden;">
        <section class="window-pane">
            <div class="window-header">
                <span class="gold-text-outline" style="font-size: 0.7rem;">SELECT MODULE</span>
                <div style="display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; scrollbar-width: none;">
                    <button class="cat-btn active" onclick="loadModule('field')">FIELD OPS</button>
                    <button class="cat-btn" onclick="loadModule('intel')">INTEL VAULT</button>
                    <button class="cat-btn" onclick="loadModule('hub')">CITIZEN HUB</button>
                </div>
            </div>
            <div class="scroll-area" id="module-list"></div>
        </section>

        <section class="window-pane" style="background: #080808;">
            <div class="window-header"><span class="gold-text-outline" style="font-size: 0.7rem;">INTELLIGENCE REPORT</span></div>
            <div class="scroll-area" id="intel-view">
                <div style="text-align: center; margin-top: 30%; color: #333;"><p class="gold-text-outline">Initializing Data Stream...</p></div>
            </div>
        </section>
    </main>

    <footer class="vanguard-footer" style="border-top: 2px solid var(--v-gold); padding: 12px; background: #000; display: flex; justify-content: space-between; align-items: center;">
        <p style="font-size: 0.65rem; color: #FFF; margin: 0;">&copy; 2026 VANGUARD OS</p>
        <a href="settings.html" style="color: #FFF; text-decoration: none; font-size: 0.7rem;">⚙️ SYSTEM SETTINGS</a>
    </footer>

    <script>
        const kernel = {
            field: [
                { title: "WiFi Infrastructure", desc: "Network hardening and setup.", Intel: "A specialized Knight will assist in deploying a secure, high-speed perimeter for your home or business." },
                { title: "Hardware Recovery", desc: "Diagnostic and repair services.", Intel: "If your tech is failing, we provide the tools and expertise to bring it back online." }
            ],
            intel: [
                { title: "Slow Connection Fix", desc: "Diagnostic Report #402", Intel: "ISSUE: Channel interference. FIX: Log into router 192.168.1.1, switch to a 5GHz band on channel 36. If issues persist, signal us for a hardware swap." },
                { title: "Privacy Leak Audit", desc: "Diagnostic Report #109", Intel: "ISSUE: Metadata exposure. FIX: Disable EXIF data on mobile devices and use a hardened browser like Brave or Librewolf." }
            ],
            hub: [
                { title: "Request Volunteers", desc: "Call for community assistance.", Intel: "Need extra hands for a local project? Submit a request here to mobilize the Citizen network." },
                { title: "The Path of the Knight", desc: "Recruitment & Training.", Intel: "Start as a Citizen, prove your integrity, and undergo training to become a Vanguard Knight." }
            ]
        };

        function loadModule(key) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const list = document.getElementById('module-list');
            list.innerHTML = '';
            kernel[key].forEach(item => {
                const card = document.createElement('div');
                card.className = 'os-card';
                card.innerHTML = `<div class="gold-text-outline">${item.title}</div><div style="font-size:0.75rem; color:#888;">${item.desc}</div>`;
                card.onclick = () => {
                    document.getElementById('intel-view').innerHTML = `
                        <h2 class="gold-text-outline" style="font-size: 1.6rem;">${item.title}</h2>
                        <p style="color: #bbb; line-height: 1.8; margin-top: 20px;">${item.Intel}</p>
                        <button class="btn-pill-gold" style="width: 100%; margin-top: 30px; background:var(--v-gold); border:none; padding:15px; font-weight:900;" onclick="location.href='support.html'">REQUEST FURTHER ASSISTANCE</button>
                    `;
                };
                list.appendChild(card);
            });
        }
        window.onload = () => loadModule('field');
    </script>
</body>
</html>
