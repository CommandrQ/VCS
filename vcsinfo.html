<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fort Toward | About Vanguard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- CORE OS ARCHITECTURE --- */
        body, html {
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(255, 255, 255, 0.02) 50%);
            background-size: 100% 4px;
            z-index: 1; 
            pointer-events: none;
        }

        .hud-header {
            flex-shrink: 0;
            background: #000;
            border-bottom: 2px solid var(--v-gold);
            z-index: 10;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            width: 100%;
            box-sizing: border-box;
        }

        /* --- BUTTON STATES --- */
        .btn-pill {
            font-family: inherit;
            font-weight: 900;
            padding: 10px 22px;
            font-size: 0.85rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s var(--v-curve);
            border: none;
            display: inline-block;
            text-align: center;
        }

        .btn-inactive {
            background: transparent !important;
            border: 1px solid #555 !important;
            color: #bbb !important;
        }
        .btn-inactive:hover {
            border-color: var(--v-gold) !important;
            color: #fff !important;
        }

        .btn-active {
            background: var(--v-gold) !important;
            border: 1px solid var(--v-gold) !important;
            color: #000 !important;
            box-shadow: 0 4px 0 #8a6d0d;
        }

        /* --- INFO VIEWPORT --- */
        .os-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .info-card {
            background: #0a0a0a;
            border: 1px solid #333;
            border-top: 4px solid var(--v-gold);
            width: 100%;
            max-width: 800px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 20px 20px 40px rgba(0,0,0,1);
            animation: systemWake 0.6s var(--v-curve) forwards;
        }

        .info-card h2 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 20px;
            font-weight: 900;
        }

        .info-card p {
            font-size: 1.15rem;
            color: #ddd;
            line-height: 1.8;
            margin-bottom: 0;
        }

        /* --- FOOTER --- */
        .vanguard-footer {
            border-top: 2px solid #222;
            padding: 20px;
            background: #000;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 12px; padding: 15px 10px; }
            .info-card { padding: 25px; }
        }
    </style>
</head>
<body class="fixed-hud">

    <div class="scanlines"></div>
    <div class="starfield s1"></div>

    <header class="hud-header">
        <div class="header-content">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="images/vanguardorglogo.png" alt="VCS" style="width:35px;">
                <span class="gold-text-outline" style="font-size: 1.2rem;">Fort Toward Intelligence</span>
            </div>
            <nav style="display: flex; gap: 10px;">
                <button class="btn-pill btn-active" style="padding: 6px 18px; font-size: 0.75rem;">ABOUT VANGUARD</button>
                <button class="btn-pill btn-inactive" style="padding: 6px 18px; font-size: 0.75rem;" onclick="location.href='directory.html'">DIRECTORY</button>
            </nav>
        </div>
    </header>

    <main class="os-viewport" id="mission-feed">
        </main>

    <footer class="vanguard-footer">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; width: 100%;">
            <p style="color: #FFF; font-size: 0.75rem; margin: 0;">&copy; 2026 VANGUARD CITIZEN SERVICES</p>
            <nav style="display: flex; gap: 15px; align-items: center;">
                <a href="legal.html" style="color: #bbb; text-decoration: none; font-size: 0.8rem;">LEGAL</a>
                <span style="color: #333;">|</span>
                <a href="settings.html" style="color: #FFF; text-decoration: none; font-weight: bold; font-size: 1rem;">⚙️ SYSTEM SETTINGS</a>
            </nav>
        </div>
    </footer>

    <script>
        /* --- MISSION DATABASE: Update your "About" info here --- */
        const MISSION_DATA = [
            {
                title: "The Origins of Fort Toward",
                content: "Fort Toward wasn't built for machines; it was built for people. In an era where technology has become increasingly complex and detached from the human experience, Vanguard OS serves as a bridge. We believe that every citizen deserves to understand and own the tools they use every day."
            },
            {
                title: "Human-Centric Sovereignty",
                content: "Our mission is simple: to foster digital sovereignty. Whether it's repairing a home router or learning the basics of privacy-first computing, we provide the intelligence and assistance needed to step into the future with confidence, not confusion."
            },
            {
                title: "The Vanguard Knights",
                content: "Vanguard is powered by a community of specialists known as Knights—volunteers and professionals dedicated to neighborhood resilience. We don't just provide 'tech support'; we provide mentorship and local service that stays within the community."
            }
        ];

        const feed = document.getElementById('mission-feed');

        // Render the cards automatically
        MISSION_DATA.forEach((item, index) => {
            const card = document.createElement('section');
            card.className = 'info-card';
            card.style.animationDelay = (index * 0.1) + 's';
            card.innerHTML = `
                <h2 class="gold-text-outline">${item.title}</h2>
                <p>${item.content}</p>
            `;
            feed.appendChild(card);
        });
    </script>
</body>
</html>
