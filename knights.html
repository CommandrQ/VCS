<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Knights | Vanguard Citizen Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --ambient-glow: rgba(212, 175, 55, 0.2);
            --dark-glass: rgba(15, 15, 15, 0.95);
            --border-gold: rgba(212, 175, 55, 0.4);
            --nav-height: 90px;
            --footer-height: 85px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden; 
        }

        /* --- STARFIELD ENGINE --- */
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 100%); overflow: hidden;
        }
        .star-layer { position: absolute; top: -100%; left: 0; width: 200%; height: 200%; background-repeat: repeat; animation: move-stars linear infinite; }
        .layer-1 { background-image: radial-gradient(1px 1px at 10% 10%, #fff, transparent); background-size: 300px 300px; animation-duration: 120s; opacity: 0.3; }
        .layer-2 { background-image: radial-gradient(2px 2px at 20% 80%, #fff, transparent); background-size: 400px 400px; animation-duration: 80s; opacity: 0.5; }
        .layer-3 { background-image: radial-gradient(4px 4px at 40% 40%, #fff, transparent); background-size: 600px 600px; animation-duration: 40s; opacity: 0.7; }
        @keyframes move-stars { from { transform: translateY(0); } to { transform: translateY(50%); } }

        /* --- UNIFORM HUD NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; height: var(--nav-height);
            display: flex; align-items: center; background: rgba(0,0,0,0.9);
            border-bottom: 1px solid var(--border-gold); z-index: 2000; backdrop-filter: blur(20px);
        }
        .nav-container { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        nav ul { display: flex; list-style: none; gap: 45px; padding: 0 40px; scroll-behavior: smooth; }
        nav ul li a {
            text-decoration: none; color: var(--gold); font-family: 'Cinzel', serif; 
            font-weight: bold; font-size: 0.9rem; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.4s; white-space: nowrap;
        }
        nav ul li a:hover { color: white; text-shadow: 0 0 15px var(--gold); }

        .scroll-hint { position: absolute; color: var(--gold); font-size: 1.2rem; pointer-events: none; z-index: 2001; opacity: 0; transition: 0.3s; }
        #hint-right { right: 15px; animation: pulse-right 2s infinite; }
        #hint-left { left: 15px; animation: pulse-left 2s infinite; }
        @keyframes pulse-right { 0%, 100% { opacity: 0; transform: translateX(0); } 50% { opacity: 1; transform: translateX(5px); } }
        @keyframes pulse-left { 0%, 100% { opacity: 0; transform: translateX(0); } 50% { opacity: 1; transform: translateX(-5px); } }

        /* --- TWO-WINDOW LAYOUT --- */
        .page-content {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: var(--nav-height) 40px var(--footer-height);
        }

        .console-panel {
            background: var(--dark-glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-gold);
            border-radius: 20px;
            width: 100%;
            max-width: 550px;
            height: 100%;
            max-height: 650px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.1);
        }

        /* Scanning HUD Animation */
        .console-panel::before {
            content: ""; position: absolute; top: -100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent, rgba(212, 175, 55, 0.05), transparent);
            animation: scan 4s linear infinite; pointer-events: none;
        }
        @keyframes scan { from { top: -100%; } to { top: 100%; } }

        .console-header {
            padding: 25px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
        }
        .console-header h2 { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 4px; font-size: 1.5rem; text-transform: uppercase; }

        .console-body {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            scrollbar-width: none; /* Stealth scroll */
        }
        .console-body::-webkit-scrollbar { display: none; }

        /* --- LIST & CARD STYLING --- */
        section { margin-bottom: 35px; }
        h3 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1rem; border-left: 2px solid var(--gold); padding-left: 12px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        .knight-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .knight-card:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }
        .knight-info h4 { font-family: 'Cinzel', serif; color: white; font-size: 1.1rem; }
        .knight-info span { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        .btn-link { color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 4px 12px; font-size: 0.65rem; text-transform: uppercase; transition: 0.3s; font-weight: bold; }
        .btn-link:hover { background: var(--gold); color: black; box-shadow: 0 0 10px var(--gold); }

        .hud-list { list-style: none; }
        .hud-list li { background: rgba(212, 175, 55, 0.05); padding: 12px; border-right: 2px solid var(--gold); margin-bottom: 10px; }
        .hud-list li strong { display: block; color: var(--gold); font-family: 'Cinzel', serif; margin-bottom: 4px; font-size: 0.9rem; }
        .hud-list li p { font-size: 0.8rem; color: #ccc; line-height: 1.5; }

        /* --- FOOTER --- */
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%; height: var(--footer-height);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(to top, #000 70%, transparent); z-index: 2000;
        }
        .legal-links { margin-bottom: 5px; }
        .legal-links a { color: white; text-decoration: none; font-size: 0.8rem; margin: 0 15px; }
        .copyright { color: var(--gold); font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 2px; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 900px) {
            .page-content { flex-direction: column; overflow-y: auto; padding: 110px 20px 100px; height: auto; min-height: 100vh; }
            .console-panel { max-height: none; height: auto; }
            body { overflow-y: auto; }
        }

        @media (max-width: 600px) {
            .nav-container { justify-content: flex-start; }
            nav::before, nav::after { content: ""; position: absolute; top: 0; height: 100%; width: 50px; z-index: 10; pointer-events: none; }
            nav::before { left: 0; background: linear-gradient(to left, transparent, #000); }
            nav::after { right: 0; background: linear-gradient(to right, transparent, #000); }
            nav ul { gap: 30px; overflow-x: auto; scrollbar-width: none; width: 100%; padding: 0 30px; }
            nav ul::-webkit-scrollbar { display: none; }
            nav ul li a { font-size: 1.1rem; }
            #hint-right, #hint-left { display: block; }
            
            footer { flex-direction: row; white-space: nowrap; }
            .legal-links::after { content: "|"; color: var(--gold); margin-right: 10px; }
        }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="star-layer layer-1"></div>
        <div class="star-layer layer-2"></div>
        <div class="star-layer layer-3"></div>
    </div>

    <nav>
        <div class="nav-container">
            <span id="hint-left" class="scroll-hint">❮</span>
            <ul id="main-nav"></ul>
            <span id="hint-right" class="scroll-hint">❯</span>
        </div>
    </nav>

    <main class="page-content">
        <div class="console-panel">
            <div class="console-header">
                <h2>Intelligence & Ops</h2>
            </div>
            <div class="console-body">
                <section>
                    <h3>Completed Missions</h3>
                    <ul id="projects-list" class="hud-list"></ul>
                </section>
                <section>
                    <h3>Strategic Alliances</h3>
                    <ul id="partnerships-list" class="hud-list"></ul>
                </section>
            </div>
        </div>

        <div class="console-panel">
            <div class="console-header">
                <h2>Vanguard Roster</h2>
            </div>
            <div class="console-body" id="roster-body">
                <section>
                    <h3>The Knights</h3>
                    <div id="roster-container"></div>
                </section>
            </div>
        </div>
    </main>

    <footer>
        <div class="legal-links">
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
        </div>
        <div class="copyright">VCS &copy; 2026</div>
    </footer>

    <script>
        const navList = document.getElementById('main-nav');
        const hLeft = document.getElementById('hint-left');
        const hRight = document.getElementById('hint-right');

        async function loadData() {
            // Load Navigation
            try {
                const navRes = await fetch('json/nav.json');
                const navData = await navRes.json();
                navList.innerHTML = '';
                navData.forEach(item => {
                    navList.innerHTML += `<li><a href="${item.link}">${item.name}</a></li>`;
                });
                updateHints();
            } catch (e) {
                navList.innerHTML = `<li><a href="index.html">Home</a></li><li><a href="about.html">About</a></li><li><a href="story.html">Story</a></li><li><a href="team.html">Team</a></li>`;
            }

            // Load Knights Data
            try {
                const res = await fetch('json/knights.json');
                const data = await res.json();

                // Roster
                const rosterCont = document.getElementById('roster-container');
                data.roster.forEach(k => {
                    rosterCont.innerHTML += `
                        <div class="knight-card">
                            <div class="knight-info">
                                <span>${k.rank}</span>
                                <h4>${k.name}</h4>
                            </div>
                            <a href="${k.link}" target="_blank" class="btn-link">Personal Access</a>
                        </div>`;
                });

                // Projects
                const projList = document.getElementById('projects-list');
                data.projects.forEach(p => {
                    projList.innerHTML += `<li><strong>${p.name}</strong><p>${p.description}</p></li>`;
                });

                // Partnerships
                const partnerList = document.getElementById('partnerships-list');
                data.partnerships.forEach(p => {
                    partnerList.innerHTML += `<li><strong>${p.org}</strong><p>${p.status}</p></li>`;
                });
            } catch (e) { console.error("Data Load Error", e); }
        }

        function updateHints() {
            if (window.innerWidth > 600) return;
            const scrollLeft = navList.scrollLeft;
            const maxScroll = navList.scrollWidth - navList.clientWidth;
            hLeft.style.opacity = (scrollLeft > 15) ? "1" : "0";
            hRight.style.opacity = (scrollLeft < maxScroll - 15) ? "1" : "0";
        }

        navList.addEventListener('scroll', updateHints);
        window.addEventListener('resize', updateHints);
        window.onload = loadData;
    </script>
</body>
</html>
